<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🧊 笑話收藏器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#0d0d0d;color:#f0f0f0;font-family:'Noto Sans TC',system-ui,sans-serif;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── HEADER ── */
#header{
  text-align:center;padding:12px 16px 10px;
  border-bottom:1px solid #1e1e1e;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,225,53,.08) 0%,transparent 70%);
  flex-shrink:0;
}
#header h1{font-size:clamp(1.3rem,5vw,2rem);font-weight:900;color:#ffe135;letter-spacing:-1px;}
#progress-wrap{max-width:360px;margin:8px auto 0;}
#progress-labels{display:flex;justify-content:space-between;font-size:0.72rem;color:#666;margin-bottom:3px;}
#progress-bar-bg{height:6px;background:#1e1e1e;border-radius:3px;overflow:hidden;}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#ffe135,#ff6b35);border-radius:3px;transition:width .4s ease;}
#tabs{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.tab-btn{
  background:#1a1a1a;color:#888;border:1px solid #2a2a2a;
  border-radius:99px;padding:5px 16px;cursor:pointer;font-size:0.82rem;
  font-family:inherit;transition:all .15s;
}
.tab-btn.active{background:#ffe135;color:#000;border-color:#ffe135;font-weight:700;}

/* ── RATE VIEW ── */
#rate-view{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow:hidden;position:relative;}

/* 卡片容器 */
#card-area{width:100%;max-width:480px;position:relative;}

/* 卡片本體 */
#joke-card{
  background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;
  padding:24px 20px;min-height:220px;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;user-select:none;
  transition:transform .15s ease, box-shadow .15s ease;
  will-change:transform;
  touch-action:none;
}
#joke-card.swiping{transition:none;}
#joke-card.swipe-right{transform:translateX(120%) rotate(10deg);opacity:0;transition:transform .3s ease,opacity .3s ease;}
#joke-card.swipe-left{transform:translateX(-120%) rotate(-10deg);opacity:0;transition:transform .3s ease,opacity .3s ease;}

/* 滑動提示 */
#like-hint,#dislike-hint{
  position:absolute;top:20px;
  font-size:1.6rem;font-weight:900;opacity:0;
  transition:opacity .1s;pointer-events:none;
  padding:6px 14px;border-radius:10px;
}
#like-hint{right:16px;color:#55ff55;border:3px solid #55ff55;transform:rotate(10deg);}
#dislike-hint{left:16px;color:#ff5555;border:3px solid #ff5555;transform:rotate(-10deg);}

#cat-tag{
  display:inline-block;background:rgba(255,225,53,.1);color:#ffe135;
  font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:4px;
  margin-bottom:12px;letter-spacing:.5px;
}
#src-tag{font-size:0.62rem;color:#444;margin-left:6px;}
#joke-q{font-size:clamp(0.92rem,2.5vw,1.05rem);line-height:1.75;white-space:pre-line;color:#ddd;flex:1;}
#joke-a{
  margin-top:16px;padding-top:14px;border-top:1px solid #2a2a2a;
  color:#ffe135;font-weight:700;font-size:clamp(0.92rem,2.5vw,1.05rem);line-height:1.6;
  display:none;animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
#reveal-btn{
  margin-top:16px;background:#111;border:1px dashed #333;border-radius:10px;
  color:#555;padding:10px;cursor:pointer;font-family:inherit;font-size:0.85rem;width:100%;
  transition:border-color .15s,color .15s;
}
#reveal-btn:active{border-color:#ffe135;color:#ffe135;}

/* 按鈕 */
#vote-btns{display:none;gap:12px;margin-top:14px;width:100%;max-width:480px;}
#vote-btns button{
  flex:1;padding:clamp(12px,3vw,18px);border-radius:14px;cursor:pointer;
  font-family:inherit;font-size:clamp(1rem,3vw,1.3rem);border:1px solid transparent;
  transition:transform .1s,opacity .1s;
}
#vote-btns button:active{transform:scale(.95);opacity:.8;}
#btn-dislike{background:#1a0000;border-color:#440000;color:#ff5555;}
#btn-like{background:#001a00;border-color:#004400;color:#55ff55;}

/* 滑動提示文字 */
#swipe-hint{
  font-size:0.72rem;color:#333;text-align:center;margin-top:10px;
}
#queue-status{font-size:0.75rem;color:#444;text-align:center;margin-top:8px;min-height:18px;}

/* 載入/空/錯誤 */
.center-msg{text-align:center;padding:40px 20px;}
.center-msg .emoji{font-size:2.5rem;margin-bottom:12px;}
.center-msg p{color:#aaa;line-height:1.8;font-size:0.92rem;}
#error-msg{color:#ff7070;}

/* ── COLLECTION VIEW ── */
#collection-view{flex:1;display:none;flex-direction:column;overflow:hidden;height:0;}
#collection-cats{
  display:flex;gap:8px;padding:12px 16px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
#collection-cats::-webkit-scrollbar{display:none;}
.cat-filter{
  background:#1a1a1a;color:#888;border:1px solid #2a2a2a;
  border-radius:99px;padding:5px 14px;cursor:pointer;font-family:inherit;
  font-size:0.8rem;white-space:nowrap;flex-shrink:0;
}
.cat-filter.active{background:#ffe135;color:#000;border-color:#ffe135;font-weight:700;}
#collection-grid{
  flex:1;overflow-y:auto;padding:0 16px 80px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;
  align-content:start;
}
.joke-card-col{
  background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;
  padding:14px;border-top:2px solid rgba(255,225,53,.2);
  transition:border-color .2s;
}
.joke-card-col.shared{border-top-color:rgba(100,200,100,.4);opacity:.65;}
.joke-card-col .jcat{font-size:0.65rem;color:#ffe135;font-weight:700;margin-bottom:6px;opacity:.7;}
.joke-card-col .jq{font-size:0.88rem;color:#ccc;line-height:1.6;white-space:pre-line;margin-bottom:8px;}
.joke-card-col .ja{font-size:0.88rem;color:#ffe135;font-weight:700;line-height:1.5;margin-bottom:12px;}
.joke-actions{display:flex;gap:8px;margin-top:10px;}
.btn-copy,.btn-share{
  flex:1;padding:7px 10px;border-radius:8px;border:none;
  cursor:pointer;font-family:inherit;font-size:0.78rem;font-weight:700;
  transition:all .15s;
}
.btn-copy{background:#1e1e1e;color:#aaa;border:1px solid #333;}
.btn-copy:active,.btn-copy.copied{background:#222;color:#ffe135;border-color:#ffe135;}
.btn-share{background:#0a1a0a;color:#55cc55;border:1px solid #1a3a1a;}
.btn-share.shared{background:#0d2a0d;color:#44aa44;border-color:#2a5a2a;}
.btn-share:active{opacity:.7;}
#no-collection{text-align:center;padding:60px 20px;color:#444;grid-column:1/-1;}
.share-filter{display:flex;gap:6px;padding:0 16px 10px;flex-shrink:0;}
.share-filter button{
  background:#1a1a1a;color:#666;border:1px solid #2a2a2a;
  border-radius:99px;padding:4px 12px;cursor:pointer;
  font-family:inherit;font-size:0.75rem;
}
.share-filter button.active{background:#333;color:#f0f0f0;border-color:#555;}
</style>
</head>

<div id="app">

  <!-- HEADER -->

      <button class="tab-btn" id="tab-collection" onclick="switchTab('collection')">📚 收藏（0）</button>
    </div>
  </div>

  <!-- RATE -->
  <div id="rate-view">

    <div id="error-view" class="center-msg" style="display:none">

    <div id="card-area" style="display:none">
      <div id="like-hint">LIKE 😂</div>
      <div id="dislike-hint">NOPE 😐</div>
      <div id="joke-card">

      </div>
    </div>
    <div id="vote-btns">
      <button id="btn-dislike" onclick="vote(false)">😐 不好笑</button>
      <button id="btn-like" onclick="vote(true)">😂 好笑！</button>
    </div>
    <div id="swipe-hint">← 左滑不好笑　右滑好笑 →</div>
    <div id="queue-status"></div>
    <div id="empty-view" class="center-msg" style="display:none">

    </div>
  </div>

  <!-- COLLECTION -->
  <div id="collection-view">
    <div id="collection-cats"></div>
    <div class="share-filter">
      <button id="sf-all" class="active" onclick="setShareFilter('all')">全部</button>
      <button id="sf-unshared" onclick="setShareFilter('unshared')">未分享 ✨</button>
      <button id="sf-shared" onclick="setShareFilter('shared')">已分享 ✅</button>
    </div>
    <div id="collection-grid"></div>
  </div>

</div>

  { id:"g008", src:"痞客邦", cat:"地獄梗", q:"一位男士問禪師：「老婆對我專橫跋扈，情人卻是萬般體貼，該怎麼辦？」\n禪師淡淡說：", a:"「永遠不要相信在野黨，誰上台後，掌權都一樣。」" },

  { id:"g013", src:"痞客邦", cat:"地獄梗", q:"面試時，主管問工作經歷。\n我答：「從事網路傳媒，社群企劃、時事新聞推廣，多次參與上萬人活動，時常和藝人、政治人物合作。」\n錄取後，同事問之前是做什麼的？\n我答：", a:"「在FB按讚分享。」" },
  { id:"g014", src:"痞客邦", cat:"地獄梗", q:"某甲問歐洲朋友：「整個歐洲文化語言都很類似，為什麼不乾脆組成一個國家？」\n德國人回答：", a:"「我們德國人上世紀努力了兩次，但大家的意願並不高。」" },
  { id:"g015", src:"痞客邦", cat:"地獄梗", q:"十年炒股兩茫茫，先虧車，後賠房。千股跌停，無處話淒涼！\n作者是誰？", a:"著名詩人白居易的弟弟——白交易" },
  { id:"g016", src:"痞客邦", cat:"地獄梗", q:"兩個餃子新婚之夜，公餃子送走賓客回洞房，發現床上有一個肉丸子，母餃子不見了。\n公餃子：「我的新娘去哪了？」\n肉丸子：", a:"「討厭，你不認得人家了？」（被人家揉圓了）" },
  { id:"g017", src:"PTT", cat:"地獄梗", q:"中華文化淵遠流長。唐代有詩，宋朝有詞，元代有曲，明清是小說，那麼民國以後最具代表性的是什麼書？", a:"參考書" },

  { id:"g031", src:"痞客邦", cat:"地獄梗", q:"有位老婆對男人說：「你走吧，我們不合適。」男人頓了頓說：「好。」\n老婆補了一刀：「你就這麼走了？都不問問我為什麼？」\n男人：", a:"「你說我們不合適，但你說話前問過我了嗎？」" },
  { id:"g032", src:"痞客邦", cat:"地獄梗", q:"老師：「小明，你的作文寫得很感人，你媽媽生病了，你哭了整晚。」\n小明：「老師……」\n老師：「我感動你能如此孝順。」\n小明：", a:"「我媽媽沒有生病，我是抄班上寫得最好的那個同學的。」" },
  { id:"g033", src:"PTT", cat:"地獄梗", q:"一個正在跑步的人忽然心臟病發倒下，幸好旁邊有個醫生立刻施救，最後成功讓他活下來。\n醫生：「還好你活過來了！你知道剛才差點…」\n病人：", a:"「完成了我的目標公里數了。」" },

  { id:"x001", src:"PTT", cat:"地獄梗🔞", q:"上急救課，老師：「口對口人工呼吸，這樣重複做，會怎樣？」\n學生：", a:"「有人會告你性騷擾。」" },
  { id:"x002", src:"PTT", cat:"地獄梗🔞", q:"阿傑穿越墳場聽到敲擊聲，越來越響越來越怕，最後發現一個人在鑿石碑。\n阿傑：「謝天謝地，你在做什麼？」\n那人：", a:"「他們把我的名字刻錯了。」" },
  { id:"x003", src:"PTT", cat:"地獄梗🔞", q:"大老闆死後，天使讓他先去地獄待24小時再做選擇。地獄是狂歡派對，美食名酒美女帥哥，超爽。\n大老闆決定選地獄，一進去卻是一片荒原，朋友們全都在上刀山下油鍋。\n守門人說：", a:"「上次你是來面試的，現在你已經是員工了。」" },
  { id:"x004", src:"PTT", cat:"地獄梗🔞", q:"三個人死後打電話交代後事：外商講5分鐘要5萬，傳統企業講2分鐘要50萬，聯發科員工把公事交代了整整20小時，問閻王要多少錢？\n閻王說：「20元。」\n聯發科：「為什麼這麼便宜！？」\n閻王：", a:"「從地獄打到地獄是市內電話，只收基本費。」" },
  { id:"x005", src:"PTT", cat:"地獄梗🔞", q:"小和尚用電腦偷看A片，老和尚看了潸然落淚說：", a:"「一本道。」" },
  { id:"x006", src:"PTT", cat:"地獄梗🔞", q:"又被女朋友感動了，今天陪她去墮胎，躺在病床上虛弱的她對我說：", a:"「親愛的，不是你的孩子我不要！」" },
  { id:"x007", src:"PTT", cat:"地獄梗🔞", q:"昨天晚上夢到一個惡夢，夢到我女朋友死了，醒了之後還傷心地啜泣，後來想想哭得更慘，因為……", a:"我根本沒有女朋友。" },
  { id:"x008", src:"PTT", cat:"地獄梗🔞", q:"我當臥底多年，今天被大哥識破了。因為大哥跟我去看電影，售票小姐問我：「買什麼票？」\n我說：", a:"「軍警票！」" },
  { id:"x009", src:"PTT", cat:"地獄梗🔞", q:"有個美女給我發Line說：「今晚來我家吧，我家沒人。」\n於是我去敲門，敲了一小時……", a:"果然沒人。" },
  { id:"x010", src:"PTT", cat:"地獄梗🔞", q:"昨天參加網友舉辦「三千人響應的放鴿子比賽」，最後結果……", a:"只有我一個人去。" },
  { id:"x011", src:"PTT", cat:"地獄梗🔞", q:"剛打電話約美女同事這週末看電影，沒想到她說不想看電影，想直接來看望我的家人！\n幸福來得太突然了……耳邊不時回想起她說的那句話：", a:"「看你媽啦！」" },
  { id:"x012", src:"PTT", cat:"地獄梗🔞", q:"老爸寫給老媽的英文情書：「I make early fuck every day, so that I can have strong body to protect you.」\n這句話的意思是？", a:"「我每天做早操，這樣我會有強壯的身體來保護你。」（早操＝early fuck）" },
  { id:"x013", src:"PTT", cat:"地獄梗🔞", q:"老爸英文情書：「Please come to eat and sleep with me, or I will cut my hair to be a monk.」\n翻譯是？", a:"「請嫁給我，否則我將削髮為僧。」（嫁＝和我吃住在一起）" },
  { id:"x014", src:"PTT", cat:"地獄梗🔞", q:"反韓風潮，三星電視、LG電視、現代汽車、泡菜都被驅逐，包心菜也在隊伍裡，泡菜問他：「你怎麼來了？」\n包心菜說：", a:"「他們說我是『高麗』菜……」\n後來巧克力也在，蔥問：「你跟韓國有什麼關係？」\n巧克力嘆氣說：「因為我……含果仁……」\n最後地瓜哭喪著臉說：「因為我是……韓籍（番薯）……」" },
  { id:"x015", src:"PTT", cat:"地獄梗🔞", q:"曾經願意為我犧牲生命的三個女人——\n年少時：「你再纏著我，我就去死！」\n外地時：「你想成為我男朋友，等下輩子吧！」\n窮困時：", a:"「你再不還我錢，我就與你同歸於盡！」" },
  { id:"x016", src:"PTT", cat:"地獄梗🔞", q:"有個男人偷情，回家後妻子嚴肅說：「你昨晚去哪了？」\n男：「跟朋友打麻將。」\n妻：「說謊！我打給那個女人了，她說你在她那。」\n男：", a:"「所以還是她比較誠實。」" },
  { id:"x017", src:"PTT", cat:"地獄梗🔞", q:"老師問：「如果你有十二顆糖，我向你要一半，你給我幾顆？」\n小明：「六顆。」\n老師：「很好，那如果你有十二個蘋果呢？」\n小明：「我不給。」\n老師：「為什麼？」\n小明：", a:"「因為我真的有十二個蘋果。」" },
  { id:"x018", src:"PTT", cat:"地獄梗🔞", q:"爸爸問兒子：「A跟B發生關係，B懷孕了，結果生了個C，請問誰是C的父親？」\n兒子不假思索：「A。」\n爸爸：「答錯了，是B的丈夫。」\n兒子看著爸爸說：", a:"「爸，那你懂的比我多耶。」" },
  { id:"x019", src:"PTT", cat:"地獄梗🔞", q:"男友說：「我最近工作壓力很大，夜晚常常睡不著，都在想你。」\n女友甜蜜地說：「真的嗎？你都在想我什麼？」\n男友：", a:"「你哪裡有介紹工作嗎？」" },
  { id:"x020", src:"PTT", cat:"地獄梗🔞", q:"某人去看醫生，醫生說：「你得了重病，只能再活三個月。」\n某人：「那我能怎麼辦？」\n醫生：「建議娶一個非常嘮叨的女人，然後搬到鄉下去住。」\n某人：「這樣能治好病？」\n醫生：", a:"「不能，但你會覺得三個月比三年還長。」" },
  { id:"x021", src:"PTT", cat:"地獄梗🔞", q:"警察問嫌疑人：「你昨晚十點在哪裡？」\n嫌疑人：「在家睡覺。」\n警察：「有人可以證明嗎？」\n嫌疑人：「有，我老婆。」\n警察：「有沒有其他人？」\n嫌疑人：", a:"「……有，我情人。」" },
  { id:"x022", src:"PTT", cat:"地獄梗🔞", q:"老師說：「人類的身體有60%是水。」\n小明：「老師，那剩下的40%是什麼？」\n老師：「其他元素。」\n小明：", a:"「那我喝水是在稀釋自己嗎？」" },
  { id:"x023", src:"PTT", cat:"地獄梗🔞", q:"法官問被告：「你承認你殺了那個人嗎？」\n被告：「承認。但法官大人，有一點請聽我解釋——」\n法官：「沉默！先回答yes or no！」\n被告：「YES。但……」\n法官：「好，你被判死刑。」\n被告的律師站起來說：", a:"「恭喜法官大人，你剛剛殺了全世界最好的外科醫生。被告是要解釋那個人其實已經快死了，他是在動手術。」" },
  { id:"x024", src:"PTT", cat:"地獄梗🔞", q:"小王問老王：「你老婆跟你在一起幸不幸福？」\n老王：「非常幸福！她說過一輩子都不離開我。」\n小王：「那你呢？」\n老王嘆氣：", a:"「所以我只好每天出門。」" },
  { id:"x025", src:"PTT", cat:"地獄梗🔞", q:"護士對醫生說：「有個病人說看到鬼，你要不要去看看？」\n醫生說：「不用，等他明天再來複診。」\n護士：「可是他說鬼在……」\n醫生：「我說不用就不用！」\n隔天護士說：「醫生，那個病人昨晚走了。」\n醫生：「果然是妄想症，好多了。」\n護士：", a:"「不是，他真的走了。鬼是在跟他說：『時間到了，跟我走。』」" },
  { id:"x026", src:"PTT", cat:"地獄梗🔞", q:"有人死後到天堂，天使帶他參觀，看到一排房間，每間房裡的鐘速度都不同。\n「這是什麼？」\n天使：「每個人撒謊一次，鐘就走快一格。」\n那人看了看問：「那台灣政治人物的鐘呢？」\n天使說：", a:"「喔，那個我們拿來當電風扇用。」" },
  { id:"x027", src:"PTT", cat:"地獄梗🔞", q:"老師：「你為什麼上課一直睡覺！」\n小明：「因為老師說話很小聲，我湊近想聽清楚。」\n老師：「那你幹嘛閉眼睛？」\n小明：", a:"「因為陽光太強，會刺眼。」" },
  { id:"x028", src:"PTT", cat:"地獄梗🔞", q:"小明問爸爸：「爸，精子和卵子是怎麼認識的？」\n爸爸正在想怎麼解釋……\n小明接著說：", a:"「算了我去問媽媽，她一定比你清楚。」" },
  { id:"x029", src:"PTT", cat:"地獄梗🔞", q:"女：「如果我和你媽同時掉進河裡，你先救誰？」\n男沉默了很久。\n女：「你為什麼不說話！」\n男：", a:"「我在等你們其中一個先沉下去，這樣就不用選了。」" },
  { id:"x030", src:"PTT", cat:"地獄梗🔞", q:"有個人第一次搭飛機很緊張，旁邊的空姐安慰：「別緊張，統計上，你在路上被車撞死的機率比飛機失事高多了。」\n男人回去後決定開車上班。\n結果當天就被車撞死了。\n天堂裡上帝說：", a:"「這怪不了統計數字。」" },

  { id:"w003", src:"痞客邦", cat:"地獄梗", q:"有個日本人走進牙醫診所。醫生說：「我們來拔個牙囉！」\n結果……", a:"醫生就被打了。" },
  { id:"w004", src:"痞客邦", cat:"地獄梗", q:"媽媽：為什麼沒接我電話?\n小明：", a:"喂時已晚" },
  { id:"w005", src:"痞客邦", cat:"地獄梗", q:"我問禪師：「我本來就黑，一到夏天曬得更黑，別人取笑我，該怎麼辦？」\n大師悠悠地把寺廟門打開，讓陽光投射進來。\n我：「大師要我打開心扉，不在乎別人看法，對嗎？」\n禪師：", a:"「不，老衲只是想看清楚，施主您到底在哪？」" },
  { id:"w006", src:"痞客邦", cat:"地獄梗", q:"「笑」和「話」是好朋友，有一天「笑」死掉了，「話」跪在他墳墓旁哭著說：", a:"「嗚……我好想笑喔……」" },
  { id:"w007", src:"痞客邦", cat:"地獄梗", q:"某人問大師：「保持快樂的秘訣是什麼？」\n大師：「不要跟笨蛋爭論。」\n某人：「我認為不是吧。」\n大師：", a:"「嗯，你說的沒錯！」" },
  { id:"w008", src:"痞客邦", cat:"地獄梗", q:"一名工程師40出頭過世，到天堂見上帝。\n工程師：「為什麼我如此年輕就死了？」\n上帝：", a:"「根據你的工時填報，你已經120歲了。」" },
  { id:"w009", src:"痞客邦", cat:"地獄梗", q:"老師發考卷喊「朱肚皮」，沒人回應；又叫「木棍」，沒人回應。最後剩兩位學生。\n老師：「你們就是朱肚皮跟木棍？」\n學生：", a:"「我是朱月坡，他是林昆。」" },
  { id:"w010", src:"痞客邦", cat:"地獄梗", q:"飛機即將失事，5人只有4個降落傘。駕駛先跳、總統說不能死也跳、校長說最重要也跳。\n只剩一個，牧師對學生說：「孩子，你拿去吧，我離天堂比較近。」\n學生回：", a:"「放心，還有兩個，校長剛剛背著我的書包跳下去了。」" },
  { id:"w011", src:"痞客邦", cat:"地獄梗", q:"警方在機場行李帶的行李箱裡查獲一具瘦得皮包骨的男屍，警方非常不解，法醫趕到後說：", a:"「這是迴轉瘦屍。」" },
  { id:"w012", src:"痞客邦", cat:"地獄梗", q:"教授和農民賭題，農民問：「上山三條腿，下山四條腿，是什麼？」教授苦思無解給了500元，再追問答案是什麼。\n農民……", a:"一言不發，又遞給教授5元，然後睡覺。" },
  { id:"w013", src:"痞客邦", cat:"地獄梗", q:"秦朝記者招聘：請報導焚書坑儒。甲說暴政當道被罵，乙說今日休刊被搖頭。丙說：", a:"「營火晚會意外，三百儒生遇難，大量古籍被毀，吾皇親赴救災！」\n考官拍桌：靠！人才。" },
  { id:"w014", src:"痞客邦", cat:"腦筋急轉彎", q:"什麼東西可以同時巴大家的頭？", a:"唐宋古文" },
  { id:"w015", src:"痞客邦", cat:"腦筋急轉彎", q:"被什麼鬼附身會讓人單身一輩子？", a:"酉鬼（醜鬼）" },
  { id:"v001", src:"痞客邦", cat:"地獄梗", q:"永澤對小丸子說：「你很卑鄙耶！不信你去問別人。」\n小丸子跑去找花輪：「花輪，我卑鄙嗎？」\n花輪：", a:"「嘿！baby～」（Hey baby＝卑鄙）" },
  { id:"v002", src:"痞客邦", cat:"地獄梗", q:"看畫展時問導覽員：「這是米勒拾穗的畫嗎？」\n導覽員搖搖頭說：", a:"「這是他四十三歲的畫。」" },
  { id:"v003", src:"痞客邦", cat:"腦筋急轉彎", q:"一學生名字叫馬騳驫。語文老師點名：萬馬奔騰到了沒？生物老師：一群馬到了沒？數學老師：六隻馬到了沒？\n歷史老師：", a:"「馬家的五馬分屍來了沒有？」" },
  { id:"v004", src:"痞客邦", cat:"地獄梗", q:"河神手上拿著金小明和銀小明，阿嬤衝過來：「挖ㄟ金孫啊啊啊！！」\n女神：「妳太貪心了。」\n（噗通）", a:"阿嬤被推進河裡了。" },
  { id:"v005", src:"痞客邦", cat:"地獄梗", q:"甲：為什麼人力銀行都是以數字命名？像是104、123、1111？\n乙：", a:"「因為奴隸只有編號，沒有名字。」" },
  { id:"v006", src:"痞客邦", cat:"短故事", q:"老師：又遲到！用一句成語說明現在的情況，說得好就不罰。\n學生：", a:"「相見恨晚。」" },
  { id:"v007", src:"痞客邦", cat:"短故事", q:"小明和小華晚上去墓仔埔試膽，聽到極為淒厲的哀嚎聲。\n小明壯起膽子大聲說：「到底是誰一直在哀啦！」\n鬼：", a:"「死了～都要哀～～～～～」" },
  { id:"v008", src:"痞客邦", cat:"地獄梗🔞", q:"美女正在洗澡。軍人敲門說升將軍、老師敲門說升主任，她都包著浴巾開門恭喜。\n接著四樓的瞎子來敲門，美女從貓眼看到是瞎子，懶得包浴巾就開門了。\n瞎子說：", a:"「恭喜我吧！我重見光明了！」" },
  { id:"v009", src:"痞客邦", cat:"地獄梗", q:"建商死後，先參觀天堂（冷清）再參觀地獄（同行朋友喝酒唱歌有辣妹），他選了地獄，進去後立刻被上刀山下油鍋。\n建商向閻王申訴：「為什麼和我參觀時完全不一樣？」\n閻王：", a:"「虧你自己是建商還搞不懂狀況，你那天參觀的是樣品屋。」" },
  { id:"v010", src:"痞客邦", cat:"地獄梗", q:"一個仲介死後下地獄，把小鬼們全激勵了，天天開晨會講夢想跳團隊舞，閻王滿頭大汗跑去天堂告狀，上帝把他調上天堂。一個月後閻王問戰況如何，上帝停下說：", a:"「你犯了三個錯。第一，叫我經理！第二，這世界沒有上帝，只有客戶才是上帝！第三，我沒空和你閒扯，我要去做每日工作報表了。」" },

  { id:"z002", src:"痞客邦", cat:"短故事", q:"老闆唱KTV唱得正盡興，小明突然手殘按到「切歌」。\n空氣瞬間凝結，大家面面相覷。\n小明：", a:"「我以為是導唱，沒人唱，所以就切了。」" },
  { id:"z003", src:"痞客邦", cat:"短故事", q:"胡瓜去科技公司面試。\n主管：你懂製程嗎？\n胡瓜：不是，我胡瓜。\n\n換董至成來面試。\n主管：你懂製程嗎？\n董至成：是。\n主管：你懂什麼？\n董至成：志成。\n主管：什麼製成？\n董至成：董。\n主管：", a:"來，下一位。" },
  { id:"z004", src:"痞客邦", cat:"短故事", q:"A：你們原住民講話後面會加「的啦」嗎？\nB：不會啊。\nA：真的嗎？\nB：", a:"真的啦。" },
  { id:"z005", src:"痞客邦", cat:"短句梗", q:"奴才的演進：\n唐代奴才：喏\n清代奴才：喳\n現代奴才：", a:"收到" },
  { id:"z006", src:"痞客邦", cat:"短故事", q:"記者訪問女星：「聽說你一天只睡三小時，那你大部分時間都在做什麼呢？」\n女星：", a:"「打瞌睡。」" },
  { id:"z007", src:"痞客邦", cat:"短故事", q:"《英雄救美篇》\n若英雄貌似潘安，美女笑回：「小女子無以為報，唯有以身相許。」\n若英雄貌似八戒，美女含淚躬身：", a:"「小女子無以為報，唯有來世做牛做馬報此大恩……」" },
  { id:"z008", src:"痞客邦", cat:"短故事", q:"魔王抓走公主說：「你盡管叫破喉嚨吧！沒有人會來救妳的！」\n公主：「破喉嚨～破喉嚨～」\n沒有人：「公主～我來救妳了！」\n魔王：「說曹操曹操就到！」\n曹操：「魔王！你叫我幹嘛？」\n魔王：「哇勒！看到鬼！」\n鬼：「靠！被發現了！」\n靠：「胡說！誰發現我了？」\n誰：「關我屁事？」\n魔王：「oh～my God！」\n上帝：「誰叫我？」\n誰：「沒有人叫你啊！」\n沒有人：「我哪有？」\n魔王……", a:"從此得了精神分裂症。" },
  { id:"z009", src:"痞客邦", cat:"地獄梗🔞", q:"魔王精神分裂好了以後又抓住公主，這次直接說：「別掙扎了！嫁給我吧！」\n公主：「好吧！」\n於是公主高高興興牽著王子的手走入禮堂……", a:"只剩下魔王呆留原地。" },

  { id:"z021", src:"PTT", cat:"地獄梗", q:"笑話是虛構近乎現實，悲劇是現實近乎虛構。\n笑話：阿公打電話跟阿嬤說高速公路幾百台車逆向。\n悲劇：", a:"這個阿公是川普。" },

  { id:"s007", src:"痞客邦", cat:"腦筋急轉彎", q:"一隻老鷹叫eagle，兩隻老鷹叫？老鷹好熱叫？老鷹很冷叫？老鷹游泳？老鷹很煩？", a:"兩gle、熱gle、冰gle、水gle、gle了沒" },

  { id:"iv001", src:"痞客邦", cat:"地獄梗", q:"從前有一位皇后非常愛她的床，百年之後，世人尊稱她為……", a:"明成皇后。（「明成」台語念起來像「名床」）" },
  { id:"iv002", src:"痞客邦", cat:"地獄梗", q:"全家正在吃飯，突然一通電話打來，爸爸接聽。\n「某某某，你兒子在我手上……」\n爸爸看看對面的兒子……", a:"「靠腰！原來你是假的！」" },
  { id:"iv003", src:"痞客邦", cat:"短故事", q:"化工所A打電話給B：「都幾點了，你還在實驗室，要不要回去睡了？」\nB：「不行，我在忙！」\nA：「什麼事？」\nB：", a:"「我在鍍鈷。」（我在度過）" },
  { id:"iv004", src:"痞客邦", cat:"短故事", q:"孔子的弟子顏淵曾感嘆：「仰之彌高，鑽之彌堅；瞻之在前，忽焉在後。」\n用現代話翻譯，這是在描述孔子……", a:"打籃球。「好高大的中鋒！防守好堅固！剛在前面，怎麼跑後面了！」" },
  { id:"iv005", src:"痞客邦", cat:"短故事", q:"洗碗阿姨自命不凡，給自己取名叫瓷洗太后（慈禧太后）。補車胎師傅取名拿破輪，電焊工取名焊武帝。兩人去糖果店炫耀，老闆遞出名片：糖太宗，兩人沉默。經過蛋糕店，門牌：漢糕祖，兩人更沉默。這時一個掏糞工騎著拉糞車經過……", a:"車上寫著：擒屎皇（秦始皇）" },
  { id:"iv006", src:"痞客邦", cat:"短故事", q:"神父在海關被問：「你有什麼要申報的嗎？」\n神父：「由我的頭到我的腰，我都沒有什麼可以申報。」\n官員：「那腰部以下呢？」\n神父：", a:"「我有一個精巧的小器具，女人專用的，但還沒用過。」\n（他幫乘客藏了一台除毛器）" },
  { id:"iv007", src:"痞客邦", cat:"短故事", q:"重考生小明邊走路邊背英文單字，突然被車撞飛住院。\n爸媽趕到，著急問他：「醫生怎麼說？」\n小明虛弱地說：", a:"「Do…Doctor…」" },
  { id:"iv008", src:"痞客邦", cat:"短故事", q:"跟同學去夜唱，本人歌喉不錯，唱完後大家熱烈拍手，高喊「幫我簽名！幫我簽名！」\n結果隔天早上……", a:"經濟學只有我到，幫大家簽名。" },
  { id:"iv009", src:"痞客邦", cat:"短故事", q:"古代皇后在位時很愛她的床。\n有個老外學了10年漢語，來台參加考試，題目是解釋：\n「冬天：能穿多少穿多少；夏天：能穿多少穿多少。」\n老外……", a:"淚流滿面，交白卷回國了。" },
  { id:"iv010", src:"痞客邦", cat:"短故事", q:"老外又苦練10年再來挑戰，題目：請解釋每個「意思」的意思。\n長官說：「你這是什麼意思？」\n阿呆說：「沒什麼意思，意思意思。」\n長官說：「你這就不夠意思了。」\n阿呆說：「小意思，小意思。」……老外又淚流滿面回國了。", a:"（一段對話裡「意思」有多種不同意思）" },
  { id:"iv011", src:"痞客邦", cat:"腦筋急轉彎", q:"古代專門閹割太監的地方叫什麼？", a:"檢調單位。" },
  { id:"iv012", src:"痞客邦", cat:"腦筋急轉彎", q:"課被當了，猜一句成語？", a:"重修舊好。" },
  { id:"iv013", src:"痞客邦", cat:"腦筋急轉彎", q:"哈士奇被結紮時說了什麼？", a:"割本哈根？（哥本哈根）" },

  // ── 西施問路 笑話I精選 ──────────────────────────────────
  { id:"i001", src:"痞客邦", cat:"短故事", q:"烏龜生病，蝸牛去探望。烏龜託蝸牛去買藥，過了很久蝸牛還沒買回來，烏龜很生氣說：「到底在搞什麼！等他回來，我就死了」\n門口忽然傳來一句話：", a:"「你再罵，我就不去了。」" },
  { id:"i002", src:"痞客邦", cat:"短故事", q:"烏龜改叫蜈蚣去買藥，一樣很久沒回來，烏龜又開罵：「腳比較多應該很快，怎麼也那麼慢？」\n此時門外傳來蜈蚣的聲音：", a:"「偶還在穿鞋啦！」" },
  { id:"i003", src:"痞客邦", cat:"短故事", q:"蒼蠅一家以大便為主食，弟弟問哥哥：「為什麼每次吃飯都要吃大便？」\n哥哥說問媽媽。媽媽聽了瞪了兩兄弟一眼說：", a:"「呸呸呸，吃飯的時候不要講這個！」" },
  { id:"i004", src:"痞客邦", cat:"短故事", q:"小壁虎遇到大鱷魚要吃牠，情急之下抱住鱷魚腿大喊：「媽媽！」\n大鱷魚一愣，立即老淚縱橫：", a:"「可憐的孩子，你怎麼瘦成這樣了！」" },
  { id:"i005", src:"痞客邦", cat:"短故事", q:"路人甲：「你瞧，在溜滑梯的小孩實在看不出是男生還是女生。」\n路人乙：「男生，他是我兒子。」\n路人甲：「對不起，我不知道你是他爸爸。」\n路人乙：", a:"「不！我是他媽媽。」" },
  { id:"i006", src:"痞客邦", cat:"短故事", q:"老師問小新：「你的毛病是用詞不當，現在用成語形容老師很開心？」\n小新答：", a:"「含笑九泉。」" },
  { id:"i007", src:"痞客邦", cat:"短故事", q:"小海馬在海裡游，看到一個白色的東西，問：「你是什麼東西？」\n那個不明生物回答：「我是龍。」\n一百年後，大海馬又遇到牠，問：「你為什麼都沒長大？」\n龍說：", a:"「因為我是保麗龍。」" },
  { id:"i008", src:"痞客邦", cat:"短故事", q:"蔣幹打電話給曹操：\n蔣幹：「操你嗎？我幹！」\n曹操：「我操，你誰啊？」\n蔣幹：「我幹啊！」\n曹操：「我操，你到底是誰啊？」\n……此時蔣幹的媽媽接過電話：", a:"「我幹他媽啊，你操吧？操你媽呢？」" },
  { id:"i009", src:"痞客邦", cat:"短故事", q:"漂亮媽媽抱著新生兒在車站哭泣，因為女兒沒遺傳她的美貌。\n站長安慰說：「先坐一下，我去給妳倒杯茶。」\n回來時說：", a:"「這杯茶給妳，這根香蕉是給妳猴子的。」" },
  { id:"i010", src:"痞客邦", cat:"短故事", q:"烏鴉媽媽病了，小烏鴉說：「媽媽，請快點好起來，不要離開我。」\n母親感動地說：「親愛的孩子，如果你不是烏鴉嘴多好啊，媽媽是真不想離開你啊。」\n次日……", a:"烏鴉媽媽，卒。" },
  { id:"i011", src:"痞客邦", cat:"短故事", q:"小明請假，老師問為什麼。\n小明：「要做手術。」\n老師：「什麼手術？」\n小明：「人體無神經組織切除手術。」\n老師：「說人話！」\n小明：", a:"「剪頭髮。」" },
  { id:"i012", src:"痞客邦", cat:"短故事", q:"老師：「丁一，你為什麼總是不守紀律，罰抄名字20遍！你看人家爨龘龗坐得多乖！」", a:"（丁一的名字只有兩字，爨龘龗抄一次就等於抄了好幾十劃）" },
  { id:"i013", src:"痞客邦", cat:"短故事", q:"唐僧取經回北京，才下飛機。記者問：「你對三陪小姐有何看法？」唐僧：「北京也有三陪小姐？」\n記者第二天登報：", a:"《唐僧飛抵北京，開口便問有無三陪》\n（唐僧回答什麼都被扭曲報導，最後為了三陪案撞牆而死，媒體補報：「為了三陪而殉情：唐僧的這一生。」）" },
  { id:"i014", src:"痞客邦", cat:"地獄梗", q:"川普和金正恩肚子很餓進了麵包店，身上沒錢。金正恩趁老闆不注意拿了三塊麵包，說：「我多聰明，老闆什麼都沒看到。」\n川普說：「用誠實的方式也能辦到，看我的！」\n川普跟老闆說要變魔術，老闆好奇給了三塊麵包，川普全吃了。\n老闆問：什麼時候才開始變魔術？\n川普說：", a:"「現在是見證奇蹟的時刻！剛才的三塊麵包，都在金正恩的口袋裡。」" },

  { id:"n008", src:"網路", cat:"地獄梗", q:"為什麼大人都教小朋友手濕濕的不能碰插座？", a:"因為怕他們早熟。" },
  { id:"n009", src:"網路", cat:"地獄梗", q:"士兵在戰場殺敵殺了3天，一槍放倒一個，一眼都沒有扎過！", a:"這麼長時間不扎眼睛，會不會乾啊？" },
  { id:"n010", src:"網路", cat:"短故事", q:"賣女孩的小火柴：「有沒有人要買小女孩？」\n大叔們：", a:"「我！我！我要買！」" },
  { id:"n011", src:"網路", cat:"短故事", q:"熊大：「你有洗澡嗎？」\n兔兔：「有啊，真的有啦！」\n然後……", a:"兔兔就被熊大抓去擦屁股了。" },
  { id:"n012", src:"網路", cat:"腦筋急轉彎", q:"有的筆叫原子筆，有的筆叫鉛筆，但是沒有筆叫什麼？", a:"沒有傷害。（沒有筆→沒有傷害）" },
  { id:"n013", src:"網路", cat:"腦筋急轉彎", q:"個性悶的人生悶氣；個性直的人生直氣；個性溫和的人呢？", a:"生薑（生薑氣？溫和→薑→薑氣）不對，答案是：生薑（溫→溫熱→薑是溫性）" },
  { id:"n014", src:"PTT", cat:"地獄梗", q:"上班不要看少了：阿傑、湯瑪、關關、蔡哥，後剩下誰啊？", a:"剩下誰？（這些都是台灣社會案件受害者的諧音或直稱）" },

  { id:"i015", src:"痞客邦", cat:"腦筋急轉彎", q:"牧場主人對牛說：「今天你就自己擠牛奶吧！」\n牛就回他說：", a:"「我真是自取其乳（辱）啊！」" },
  { id:"i016", src:"痞客邦", cat:"短故事", q:"有次跟大學同學去夜唱，因為本人歌喉不錯，唱完後大家熱烈拍手叫好，並且每個人都高喊：「幫我簽名！幫我簽名！」\n結果隔天早上，經濟學只有我到……", a:"並且幫大家簽名。" },
  { id:"i017", src:"PTT", cat:"腦筋急轉彎", q:"芥末走在路上，被路人打了一巴掌。\n路人：「你不是很嗆？」\n芥末：「你幹嘛打我？」", a:"（芥末被打→打芥末→打嗝沫？→芥末被嗆→you嗆我？）核心是路人覺得芥末嗆所以打它" },
  { id:"i018", src:"痞客邦", cat:"短故事", q:"有一天，大魚問小魚：「你知道魚的記憶力只有三秒嗎？」\n小魚：「真的假的！？」\n大魚：", a:"「什麼真的假的？」（大魚已經忘了自己剛說什麼）" },

  { id:"hd003", src:"PTT", cat:"短故事", q:"老師問風紀股長：「有沒有應到的未到？」\n風紀大力地吸了兩口氣回答：", a:"「沒聞到。」（聞到→問到）" },

  { id:"hd006", src:"PTT", cat:"地獄梗🔞", q:"路邊來了一台捐精車，後來有一位小姐上車了。\n工作人員：「小姐，我們這是捐精車，要請妳下車喔。」\n小姐努力講出一句話：", a:"「那我嘴裡的怎麼辦？」" },
  { id:"hd007", src:"PTT", cat:"短故事", q:"小白兔跟大象很久沒見面了，一見面就問：「大象，近來好嗎？」", a:"白兔卒。（大象→象→像→一見如「故」→一問就沒了）" },
  { id:"hd008", src:"PTT", cat:"腦筋急轉彎", q:"為什麼數學老師的第一個小孩都是女生啊？", a:"因為他都先設X再設Y。" },

  { id:"hd010", src:"PTT", cat:"短故事", q:"毛利小五郎在台上致詞，小蘭站在他旁邊。\n臺下的柯南發現有人要狙擊小蘭！\n柯南大喊：「小蘭趴下來！」\n然後……", a:"毛利小五郎就默默下台了。（爸爸聽到「趴下來」…）" },
  { id:"hd011", src:"PTT", cat:"短故事", q:"小時候：\n小美：哈囉\n小明：哈囉\n長大後：\n小美：哈囉\n小明：", a:"好啊。（哈囉→好啊）" },
  { id:"hd012", src:"PTT", cat:"短故事", q:"小明跟小美在沙漠遇到神燈，各許一個願望。\n小明：「我想要變聰明。」→得到聰明丸。\n小美：「我想要長高丸。」\n於是……", a:"小美就變成了男生。（長高丸→長根丸→長了）" },
  { id:"hd013", src:"PTT", cat:"短故事", q:"小千跟小北是一對情侶，到了晚上……", a:"他們變成了小乖。（千+北=乖）" },
  { id:"hd014", src:"PTT", cat:"短故事", q:"小美：「你知道路邊的傳單跟你有什麼共通點嗎？」\n小明：「不知道。」\n小美：", a:"「印了也沒有人要看啦。」" },
  { id:"hd015", src:"PTT", cat:"地獄梗🔞", q:"妹妹：「媽咪，為什麼我下面長毛？」\n媽媽：「因為你下面長了一隻小猴子呀。」\n妹妹跑去跟姐姐炫耀自己有小猴子。\n姐姐：", a:"「哼！你那算什麼，我的猴子早就吃過香蕉了。」" },
  { id:"hd016", src:"PTT", cat:"地獄梗🔞", q:"小明：「爸爸，你在樓上幹什麼？下樓教我數學啊！」\n爸爸：", a:"「媽媽啊。」" },
  { id:"hd017", src:"PTT", cat:"短故事", q:"男：Are you free tonight?\n女：", a:"No, but I'm cheap." },
  { id:"hd018", src:"PTT", cat:"腦筋急轉彎", q:"為什麼房間的英文叫做room？", a:"因為……啊……喔……喔……嗯。（room的發音）" },
  { id:"hd019", src:"PTT", cat:"短句梗", q:"大風一吹～\n鳥：", a:"我巢吹了。（我超吹了）" },

  { id:"hd021", src:"PTT", cat:"地獄梗🔞", q:"男：「想不想聽一個有關我老二的故事？」\n男：「算了，太長了我不想說。」", a:"（欲言又止，強調「太長了」）" },
  { id:"hd022", src:"PTT", cat:"地獄梗🔞", q:"女：「想不想聽一個關於我陰道的故事？」\n女：「算了，太深了你聽不懂！」", a:"（同上反版）" },

  { id:"hd023", src:"PTT", cat:"短故事", q:"小美問小明：「你們家是開什麼的？」\n小明：「我爸開賓士，我媽開特斯拉。」\n小美：「哇！那你開什麼？」\n小明：", a:"「我開玩笑。」" },
  { id:"hd024", src:"PTT", cat:"短故事", q:"小明怕iPhone被偷在藏手機。\n小華：「為什麼要把手機藏起來？」\n小明：「我在實踐今天老師教的道理——『機不可失』，所以我要守護好手機！」", a:"（機不可失→手機不可失）" },
  { id:"hd025", src:"PTT", cat:"短故事", q:"有三個人到早餐店點荷包蛋。\n甲：「我的蛋不要蛋黃。」\n乙：「我的蛋不要蛋白。」\n老闆不耐煩問丙：「你的蛋不要什麼？」\n丙：", a:"「我不要蛋殼！」" },
  { id:"hd026", src:"PTT", cat:"短故事", q:"老師教小朋友：「弄丟了東西要報告老師。」\n有小朋友馬上舉手。\n老師：「你弄丟了什麼？」\n小朋友：", a:"「媽媽說我都『丟三落四』。」" },

  { id:"fs005", src:"痞客邦", cat:"腦筋急轉彎", q:"某天大甲溪向大肚溪告白，大肚溪拒絕了。\n大甲溪：「為什麼？難道我不夠好嗎？」\n大肚溪：", a:"「因為……我們不是河。」（不是一家人）" },
  { id:"fs006", src:"痞客邦", cat:"腦筋急轉彎", q:"孔明：「魯肅啊，近來可好？」\n魯肅：「別來無恙。」\n孔明：「魯夫人呢？」\n魯肅：", a:"「他現在應該在偉大的航道上。」（魯夫人→路飛人→航海王）" },
  { id:"fs007", src:"痞客邦", cat:"腦筋急轉彎", q:"有一天周武王不能講話變成啞巴，他會變成誰？", a:"羅志祥，因為啞周武王。（啞周→亞洲→亞洲舞王）" },
  { id:"fs008", src:"痞客邦", cat:"短故事", q:"孫權手下甘興不小心把孫權心愛的桌子割了一痕，孫權要處死他。\n周瑜想到妙計救了他，下令全國割東西前先在桌上墊張紙……\n這就是……", a:"全國墊紙救甘興的由來。" },
  { id:"fs009", src:"痞客邦", cat:"短故事", q:"老師要找李弘毅同學，但忘記他的班級，在走廊隨問個人：「同學，李弘毅幾班？」\n同學：", a:"「DAIKIN！」（大金冷氣，台語：大金→大幾班→幾班？）" },
  { id:"fs010", src:"痞客邦", cat:"腦筋急轉彎", q:"以前有個食客不小心撞見皇上和妃子洞房，於是他就變成了……", a:"見朕騎姬的食客（千與千尋）" },
  { id:"fs011", src:"痞客邦", cat:"腦筋急轉彎", q:"柯南跳樓了，灰原會怎樣？", a:"煎熬，因為「新一跳，哀就開始煎熬……」" },
  { id:"fs012", src:"痞客邦", cat:"腦筋急轉彎", q:"楊丞琳、蔡依林、王若琳一起去潛水，過了很久只有楊丞琳跟蔡依林浮起來，為什麼？", a:"因為若琳 in the deep。" },
  { id:"fs013", src:"痞客邦", cat:"短故事", q:"皮卡丘忘了帶學生證，站在宿舍門口外難過地說：「皮卡皮卡～」\n傑尼龜走過來說：", a:"「借你借你～」（傑尼=借你）" },
  { id:"fs014", src:"痞客邦", cat:"腦筋急轉彎", q:"諸葛亮喜歡誰？", a:"臭皮匠，因為三個臭皮匠勝過一個諸葛亮（諸葛亮 < 3臭皮匠）" },
  { id:"fs015", src:"痞客邦", cat:"腦筋急轉彎", q:"小女孩小男孩，猜一句成語？", a:"好景不常（好景不long）" },
  { id:"fs016", src:"痞客邦", cat:"腦筋急轉彎", q:"聞聞自己，猜一美食？", a:"滷味" },
  { id:"fs017", src:"痞客邦", cat:"短故事", q:"小明：「小陳！不要指月亮。」\n小東：「蛤？」", a:"（在樹上饒舌）桑。（「桑」=sang=在桑上=yo yo yo）" },
  { id:"fs018", src:"痞客邦", cat:"腦筋急轉彎", q:"在樹上唱rap，猜一個字？", a:"桑（yo yo yo，在桑上）" },
  { id:"fs019", src:"痞客邦", cat:"腦筋急轉彎", q:"把家裡幫傭鎖起來，猜一個國家？", a:"索馬利亞（鎖嘛莉呀）" },
  { id:"fs020", src:"痞客邦", cat:"短故事", q:"有一天，有個外國人搭了我的肩膀問：「請問這裡是台北嗎？」\n我回：", a:"「不，這是我的肩膀。」" },
  { id:"fs021", src:"痞客邦", cat:"腦筋急轉彎", q:"易經他媽媽是誰？", a:"液晶螢幕（液晶→Yi-Jing→易經生了液晶）" },
  { id:"fs022", src:"痞客邦", cat:"腦筋急轉彎", q:"為什麼刺蝟有很多小孩？", a:"因為他背上很多刺（很多時）" },
  { id:"fs023", src:"痞客邦", cat:"腦筋急轉彎", q:"禿頭的人適合看什麼片？", a:"鬼片，因為會讓他們頭皮發毛。" },
  { id:"fs024", src:"痞客邦", cat:"腦筋急轉彎", q:"念書念到爆肝怎麼辦？", a:"喝茶裏王，因為喝一口，救回肝。" },
  { id:"fs025", src:"痞客邦", cat:"腦筋急轉彎", q:"你知道你跟一盤大便有什麼差別嗎？", a:"你沒有盤子。" },
  { id:"fs026", src:"痞客邦", cat:"短故事", q:"醫生問小明：「如果把你一邊耳朵割掉你會怎樣？」\n小明：「我會聽不見。」\n「那再割掉另一個耳朵呢？」\n小明：「我會看不見。」\n為什麼？", a:"因為眼鏡會掉下來。" },
  { id:"fs027", src:"痞客邦", cat:"腦筋急轉彎", q:"大幾的暑假要早起？", a:"大一（Wake up！你是大一暑假）" },
  { id:"fs028", src:"痞客邦", cat:"短故事", q:"中華文化淵遠流長。唐代有詩，宋朝有詞，元代有曲，明清是小說，那麼民國以後最具代表性的是什麼書？", a:"參考書。" },
  { id:"fs029", src:"痞客邦", cat:"短故事", q:"阿哲問阿明：「我爸爸在公車上會讓座，你爸會嗎？」\n阿明：「不可能！」\n阿哲以為阿明爸爸真厚臉皮，阿明接著說：", a:"「因為我爸爸是公車司機。」" },
  { id:"fs030", src:"痞客邦", cat:"短故事", q:"爸爸罵兒子：「你為什麼天天在學校打架！」\n兒子：「我沒有啊！」\n爸爸更生氣：「你還裝傻！導師已經跟我說了：」", a:"「你都和同學打成一片！」" },

  { id:"kl007", src:"痞客邦", cat:"腦筋急轉彎", q:"氧氣和二氧化碳誰比較美？", a:"氧氣，因為氧氣會助燃，助燃（自然）就是美。" },

  { id:"kl009", src:"痞客邦", cat:"腦筋急轉彎", q:"武士怎麼死的？", a:"餓死，因為5×4=20（武士→五四→伍肆→餓死？不對，五四節沒飯吃）" },
  { id:"kl010", src:"痞客邦", cat:"腦筋急轉彎", q:"什麼昆蟲最有遠見？", a:"螞蟻，因為他們總為蟻后（以後）著想。" },
  { id:"kl011", src:"痞客邦", cat:"腦筋急轉彎", q:"為什麼饒舌歌手都買不到葡萄？", a:"因為他們都跟老闆說：「我要一串葡萄yo～我要一串葡萄yo～」" },
  { id:"kl012", src:"痞客邦", cat:"腦筋急轉彎", q:"地瓜是哪國人？", a:"韓國人，因為他是韓籍（台語番薯）" },
  { id:"kl013", src:"痞客邦", cat:"短故事", q:"有次去聽演唱會，原唱一直唱錯，我就糾正原唱……", a:"然後鄭元暢（正原唱）就來了。" },
  { id:"kl014", src:"痞客邦", cat:"腦筋急轉彎", q:"十二生肖哪隻動物不會感冒？", a:"雞，因為雞掃化痰（急速化痰）" },
  { id:"kl015", src:"痞客邦", cat:"短故事", q:"警察對出車禍的機車騎士說：「請問你叫什麼名字，我通知你家裡的人。」\n騎士忍著痛說：", a:"「不用了……我的家人……知道我的名字。」" },
  { id:"kl016", src:"痞客邦", cat:"短故事", q:"一女生徵婚條件輸入電腦：1.要帥 2.要有車 → 象棋。\n改輸入：1.要有錢 2.要有房子 → 銀行。\n再輸入：1.要man 2.要有安全感 → 鹹蛋超人。\n最後全部條件一起輸入……", a:"電腦回她：「在銀行下象棋的鹹蛋超人！」" },
  { id:"kl017", src:"痞客邦", cat:"短故事", q:"大象走進森林忘記帶面紙，抓了小白兔來擦屁股。\n隔天，大象吃完午餐要擦嘴，松鼠說話了：", a:"「大象你忘記我啦！我是昨天的小白兔！」" },
  { id:"kl018", src:"痞客邦", cat:"短故事", q:"大便跟小便兩個是好朋友，有天大便死了，小便就很難過地說：", a:"「我想大便～」" },
  { id:"kl019", src:"痞客邦", cat:"短故事", q:"一隻貓跟一隻小小鳥相遇。\n貓：「你感動嗎？」\n鳥：", a:"「我不敢動。」" },
  { id:"kl020", src:"痞客邦", cat:"腦筋急轉彎", q:"如果動物園失火了，最先逃出來的是哪一種動物？", a:"人。" },
  { id:"kl021", src:"痞客邦", cat:"短故事", q:"有一天小明說：「老師，小安他人身攻擊我。」\n老師：「那你可以用當歸反擊啊！」", a:"（當歸→擋龜？→以藥材回擊）" },
  { id:"kl022", src:"痞客邦", cat:"短故事", q:"我講一個笑裡藏刀的笑話：", a:"「哈哈哈哈哈哈哈哈刀哈哈哈哈哈哈哈哈」" },
  { id:"kl023", src:"痞客邦", cat:"腦筋急轉彎", q:"為什麼馬克杯跟玻璃杯打招呼，玻璃杯不理他？", a:"因為玻璃杯沒耳朵。" },
  { id:"kl024", src:"痞客邦", cat:"腦筋急轉彎", q:"哪一個字需要寫很久？", a:"「朋」，因為一寫就要寫兩個月。" },
  { id:"kl025", src:"痞客邦", cat:"腦筋急轉彎", q:"為什麼飯不能咬太久呢？", a:"因為會飯（犯）太碎（歲）～" },
  { id:"kl026", src:"痞客邦", cat:"短故事", q:"媽媽：「如果妳老公有外遇，你會怎麼樣？」\n女兒：「我會睜一隻眼，閉一隻眼。」\n媽媽：「妳這麼大方！」\n女兒：", a:"「不，我是要用槍瞄準他～」" },
  { id:"kl027", src:"痞客邦", cat:"短故事", q:"老王跟小明約好誰先上天堂就託夢告訴對方有沒有棒球。\n結果小明先走了，有一天，老王睡覺夢到小明來託夢：「老王，天堂真的有棒球欸！下禮拜你來擔任右外野手。」", a:"（老王下禮拜就死了）" },
  { id:"kl028", src:"痞客邦", cat:"短故事", q:"老王娶了跆拳五段的妻子。有一天，老婆問：「老公，你覺得我漂不漂亮？」\n老王：「漂亮！漂亮！」\n老婆：「你說我漂亮，是不是怕傷害我啊？」\n老王抖著說：", a:"「不，我是怕妳會傷害我！」" },
  { id:"kl029", src:"痞客邦", cat:"短故事", q:"老闆叫秘書買玫瑰花，一個情人送一朵就行。秘書打電話問：「boss，你有幾個情人？」\n老闆：「是一個人。」\n秘書：「11個人？」\n老闆：「不是11個，是一個人。」\n秘書：「21個人？」\n老闆吼：「就是一個人！」\n秘書：「91個？」\n老闆：「吼！二百五，是一個人啊。」\n秘書：", a:"「251個人？！……」\n（老闆頓時暈倒）" },
  { id:"kl030", src:"痞客邦", cat:"短故事", q:"病人：「醫生，最近我總覺得自己是一條狗。」\n醫生：「從什麼時候開始的？」\n病人：「從我還是小狗的時候。」\n醫生：", a:"「那你應該去看獸醫。」" },
  { id:"kl031", src:"痞客邦", cat:"短故事", q:"媽媽說：喜歡喝什麼可以看出一個人的社交習慣！喝奶茶的女人閨蜜多，喝白酒的女人故事多，喝紅酒的女人情人多。\n我說：「那像我這種愛喝白開水的女人呢？」", a:"「尿多。」" },
  { id:"kl032", src:"痞客邦", cat:"地獄梗", q:"阿公買了一隻從茶室帶回來的鸚鵡，掛在陽台。\n鸚鵡：「環境變了！環境變了！」\n媽媽跑來看，鸚鵡：「老闆娘換了！老闆娘換了！」\n女兒跑來看，鸚鵡：「小姐也換了！小姐也換了！」\n這時候爸爸回來了，鸚鵡說：", a:"「人客沒變！人客沒變！」" },
  { id:"kl033", src:"痞客邦", cat:"短故事", q:"有一日上國文課，老師說：「以後上網發言不要再自稱『筆者』，現在根本沒人用筆寫字。」\n學生：「那要怎麼稱呼?」\n老師：「鍵人。」\n學生：「那用滑鼠的人呢？」\n老師：「叫鼠輩。」\n學生：「那智慧型手機都用觸控式的，又沒鍵盤、沒滑鼠，又該怎麼稱呼？」\n老師：", a:"「那就叫……指望你們了。」" },

  { id:"mm001", src:"網路", cat:"短故事", q:"有一天小明去圖書館，小明說：「我要一碗牛肉麵。」\n櫃檯：「先生，這裡是圖書館。」\n小明很抱歉地說：", a:"「喔喔好（氣音）……我要一碗牛肉麵。」" },
  { id:"mm002", src:"網路", cat:"短故事", q:"有一天父親拿一根筷子讓兒子折，折斷了。又拿三隻，折斷了。再拿三十隻，還是折斷了。\n兒子問：「爸，你到底要幹嘛？」\n父親說：", a:"「沒事。」" },

  { id:"mm004", src:"網路", cat:"腦筋急轉彎", q:"栗子從山上滾下來變什麼？", a:"血淋淋的栗子。" },
  { id:"mm005", src:"網路", cat:"腦筋急轉彎", q:"哈利波特裡面誰最有主見？", a:"佛地魔，因為他不會被牽著鼻子走。" },
  { id:"mm006", src:"網路", cat:"短故事", q:"有一天小明他爸很渴，叫小明幫他倒水，但小明遲遲沒去。\n小明爸說：「你是要逼爸渴死嗎？」\n於是小明就……", a:"開始B Box了。（渴死→可死→Beatbox）" },
  { id:"mm007", src:"網路", cat:"短故事", q:"有一天軟糖難過的哭了……", a:"然後他就變成QQ軟糖了。" },
  { id:"mm008", src:"網路", cat:"腦筋急轉彎", q:"有一天有隻深海魚在海裡自由自在地游，但牠一點也不開心，為什麼？", a:"因為他壓力很大。" },
  { id:"mm009", src:"網路", cat:"短故事", q:"大嘴魚遇到小魚問喜歡吃什麼，小魚說浮游生物，大嘴魚：「喔～是喔。」\n遇到大魚問，大魚說喜歡吃小魚，大嘴魚：「喔～是喔。」\n最後遇到鯊魚問，鯊魚說喜歡吃大嘴魚，大嘴魚：", a:"「喔，速喔。」（嘴巴噘小）" },
  { id:"mm010", src:"網路", cat:"短故事", q:"一隻小兔子去池塘釣魚，三天都沒釣到。第四天，一隻魚蹦出水面對著小兔子咆哮：", a:"「你丫再用胡蘿蔔當餌，老子抽死你！」" },
  { id:"mm011", src:"網路", cat:"短故事", q:"公雞小心翼翼地說：「其實，我們不想被吃掉！」\n主人打斷：", a:"「你看你，說著說著就跑題了！」" },
  { id:"mm012", src:"網路", cat:"腦筋急轉彎", q:"盲人最喜歡遇到什麼人？", a:"流氓，因為他們喜歡說「給他們一點顏色瞧瞧」。" },

  { id:"bb031", src:"痞客邦", cat:"短故事", q:"男：「妳怎麼那麼可愛，讓我不知道怎麼形容妳。」\n女：「那就不要形容了。」\n男：「一定要說！妳就像⋯⋯一條魚！」\n女：「魚？！」\n男：", a:"「因為我想把你釣回家。」" },

  { id:"bb033", src:"痞客邦", cat:"短故事", q:"女：「你說你愛我，但你有沒有為我做過什麼犧牲？」\n男想了想說：「有啊！」\n女：「什麼？」\n男：", a:"「和妳交往之後，我再也沒去找過別的女人。」" },
  { id:"bb034", src:"痞客邦", cat:"短故事", q:"太太問：「如果我先死了，你會不會再娶？」\n丈夫：「不會。」\n太太：「為什麼？」\n丈夫：", a:"「因為妳娘家的人會殺了我。」" },
  { id:"bb035", src:"痞客邦", cat:"短故事", q:"妻：「你說說，你愛我什麼？」\n夫：「哎，說來話長——」\n妻：「長？」\n夫：", a:"「說來話長短，妳說呢？」（說來話長短→說不出來？其實是指話很多）" },
  { id:"bb036", src:"痞客邦", cat:"短故事", q:"老婆哭著問：「你是不是嫌棄我老了，不愛我了？」\n老公柔聲說：「哪有，我只是在想——」\n老婆：「想什麼？」\n老公：", a:"「你之前說的那個保養品，我去幫你買。」" },
  { id:"bb037", src:"痞客邦", cat:"地獄梗", q:"有個老先生每天去圖書館借一本書，看完隔天還回來再借一本，持續了幾十年。\n有一天圖書館員好奇問他：「老先生，你這輩子讀了多少本書？」\n老先生想了想說：", a:"「算起來應該差不多把圖書館搬回家過一遍了。現在只剩一本我還沒看。」\n館員：「哪一本？」\n老先生：「借書登記本。」" },
  { id:"bb038", src:"痞客邦", cat:"短故事", q:"老師：「如果有人送你一百萬，你打算怎麼用？」\n小明：「我要買一台新電腦。」\n老師：「那剩下的錢呢？」\n小明：", a:"「等著吧。」" },
  { id:"bb039", src:"痞客邦", cat:"腦筋急轉彎", q:"什麼動物最沒記性？", a:"魚，3秒就忘記了。但也因此，牠每天都活得很快樂。" },
  { id:"bb040", src:"痞客邦", cat:"短故事", q:"媽媽說：「今天作業做完了嗎？」\n孩子：「做完了。」\n媽媽：「那你有沒有複習？」\n孩子：「有。」\n媽媽：「那你有沒有預習明天的功課？」\n孩子沉默一下：", a:"「我的手機沒電了。」" },
  { id:"bb041", src:"痞客邦", cat:"短故事", q:"女兒問：「媽，結婚是什麼感覺？」\n媽媽正在做菜，把一顆雞蛋打入鍋中，說：", a:"「就像這顆蛋，下去就回不來了。」" },
  { id:"bb042", src:"痞客邦", cat:"地獄梗", q:"法官問被告：「你承認你搶了那位老太太的手提包嗎？」\n被告：「法官大人，我哪裡是搶，我是借。」\n法官：「借？有打算還嗎？」\n被告：", a:"「本來有，但她跑太慢被我追上了。」" },
  { id:"bb043", src:"痞客邦", cat:"短故事", q:"一個人去看牙醫，結果越想越怕，到診所門口就跑掉了。\n診所護士追出來說：「先生！先生！不用怕的，很快就好了！」\n那人繼續跑，大喊：", a:"「你是說換我就好了！我知道！」" },
  { id:"bb044", src:"痞客邦", cat:"短故事", q:"小明：「媽，我今天考了一百分！」\n媽媽：「哪一科？」\n小明：「三科加起來。」", a:"（三科加起來100分）" },
  { id:"bb045", src:"痞客邦", cat:"短故事", q:"老師問：「請問誰知道『鴻漸於陸』是什麼意思？」\n全班沉默。\n老師嘆了口氣：「就是大雁慢慢飛到陸地上的意思。」\n小明舉手：「老師，那『鴻漸於逵』呢？」\n老師：「就是大雁飛到十字路口。」\n小明又問：「那有沒有鴻漸於沙？」\n老師：「沒聽過，為什麼？」\n小明：", a:"「我想看大雁沙灘排球。」" },

  { id:"bq052", src:"痞客邦", cat:"短故事", q:"英文老師：「請用single造句。」\n小美：「我媽媽叫我不要找single的男人。」\n老師：「什麼意思？」\n小美：", a:"「單身漢，因為結了婚才知道賺多少。」" },

  { id:"bq054", src:"痞客邦", cat:"短故事", q:"老師：「如果你爸爸給你10元，你媽媽給你20元，請問你有多少錢？」\n學生說：「30元。」\n老師說：「說錯了，你應該說30元整才對！」\n學生又說：", a:"「老師，我爸爸給我的是假幣。」" },
  { id:"bq055", src:"痞客邦", cat:"短故事", q:"媽媽對兒子說：「去把這瓶醋拿到隔壁王媽媽家，說是借的。」\n兒子回來說：「王媽媽說她上次借你的還沒還呢。」\n媽媽：「你怎麼說？」\n兒子：", a:"「我說那就算了，我們家有的是醋。」" },

  { id:"gh001", src:"痞客邦", cat:"短故事", q:"鬼最怕三種東西：咖啡、錢、女人。\n為什麼？", a:"鬼怕咖啡因為咖啡可提神；鬼怕錢因為有錢可使鬼推磨；最怕女人，因為她能移神移鬼。" },
  { id:"gh002", src:"痞客邦", cat:"短故事", q:"晚上11點散步路過墳地，被老婆婆問那麼晚在街上幹嘛。我說：「我在等我的家人給我錢！」\n老婆婆臉色蒼白，轉身狂奔。\n我大喊：「老婆婆不要跑，我真的在等家人給我錢！」\n結果……", a:"四周的人也全跑走了。" },
  { id:"gh003", src:"痞客邦", cat:"短故事", q:"有女子夜晚被好色男子尾隨，走到墳地旁，她當機立斷走到一座墳墓前說：「爸爸，開門吧！我回來了。」嚇跑了跟蹤男。\n女子得意地笑了起來，哪知笑聲未落，從墳墓裡傳出：「女兒，你怎麼又忘記帶鑰匙了？」\n嚇得女子狂奔。此時盜墓者從墳墓裡爬出來說：「影響我工作，嚇死你。」\n盜墓者突然看到老翁在刻墓碑，問：「你在幹嘛？」\n老翁：「這些不肖子孫把我的墓碑刻錯了，只好自己來改。」嚇跑了盜墓者。\n老翁的鑿子掉地上，從草叢中伸出一隻手：「誰啊？敢亂改我家的門牌號碼！」嚇跑了老翁。\n從草叢中爬出一個拾荒者，撿起鑿子，感嘆：", a:"「這年頭，撿塊爛鐵，還得這麼費神……」" },

  // ── 寶貝問路 靠北經典搞笑語錄精選 ─────────────────────
  { id:"kb001", src:"痞客邦", cat:"短句梗", q:"一分鐘有多長，這是要看你……", a:"蹲在廁所裡面還是蹲在廁所外面。" },
  { id:"kb002", src:"痞客邦", cat:"短句梗", q:"一隻大象問駱駝：「你的咪咪怎麼長在背上？」\n駱駝說：", a:"「死遠點，我不和雞雞長在臉上的東西講話！」" },
  { id:"kb003", src:"痞客邦", cat:"短句梗", q:"我喜歡你，就像你媽打你……", a:"不講道理。" },
  { id:"kb004", src:"痞客邦", cat:"短句梗", q:"物價漲得太快，所以我在餐館吃飯的時候……", a:"都會先付錢。" },
  { id:"kb005", src:"痞客邦", cat:"短句梗", q:"一早醒來我以為我長大了，原來是……", a:"被子蓋橫了。" },
  { id:"kb006", src:"痞客邦", cat:"短句梗", q:"別人的錢財乃……", a:"我的身外之物！" },
  { id:"kb007", src:"痞客邦", cat:"短句梗", q:"與人爭執時，退一步海闊天空；追女友時，退一步……", a:"人去樓空。" },
  { id:"kb008", src:"痞客邦", cat:"短句梗", q:"生，容易。活，容易。生活……", a:"不容易。" },
  { id:"kb009", src:"痞客邦", cat:"短句梗", q:"人人都說我醜，其實……", a:"我只是美得不明顯。" },
  { id:"kb010", src:"痞客邦", cat:"短句梗", q:"脫了衣服我是禽獸，穿上衣服我是……", a:"衣冠禽獸！" },
  { id:"kb011", src:"痞客邦", cat:"短句梗", q:"愛情是藝術，結婚是技術，離婚是……", a:"算術。" },
  { id:"kb012", src:"痞客邦", cat:"短句梗", q:"逝去的愛情就跟落枕一樣……", a:"回頭會很痛！" },
  { id:"kb013", src:"痞客邦", cat:"短句梗", q:"還是古代好混，割掉了就能……", a:"當公務員。" },
  { id:"kb014", src:"痞客邦", cat:"短句梗", q:"發怒一分鐘便失去……", a:"60秒的幸福。" },
  { id:"kb015", src:"痞客邦", cat:"短句梗", q:"人的一生就像在拉屎，有時你已經很努力了……", a:"可出來的只是一個屁。" },
  { id:"kb016", src:"痞客邦", cat:"短句梗", q:"老公是最好的傾聽者，因為……", a:"他根本沒在聽！" },
  { id:"kb017", src:"痞客邦", cat:"短句梗", q:"令人不能自拔的，除了牙齒還有……", a:"愛情。" },
  { id:"kb018", src:"痞客邦", cat:"短句梗", q:"其實我並不笨，只是……", a:"懶得聰明罷了。" },
  { id:"kb019", src:"痞客邦", cat:"短句梗", q:"帥有個屁用！到頭來還不是……", a:"被卒吃掉！" },
  { id:"kb020", src:"痞客邦", cat:"短句梗", q:"我要讓全世界知道……", a:"我很低調！" },
  { id:"kb021", src:"痞客邦", cat:"短句梗", q:"不要以為全世界只有你一個在傷心，其實別人……", a:"只是比你會掩飾。" },
  { id:"kb022", src:"痞客邦", cat:"短句梗", q:"眾裡尋他千百度，驀然回首……", a:"那人依舊對我不屑一顧。" },
  { id:"kb023", src:"痞客邦", cat:"短句梗", q:"命運又給我洗了一次牌，但玩牌的……", a:"還是我自己。" },

  // ── 寶貝問路 爆笑第1集精選（新的）────────────────────────
  { id:"e1_01", src:"痞客邦", cat:"短故事", q:"阿嬤和小孫子搭電梯，一個高大帥氣的男人進來，身上充滿濃烈的古龍水味道。\n阿嬤湊近聞了聞，大聲說：「你抹了很多的膏耶！」\n男人有點尷尬。\n阿嬤補了一刀：", a:"「你有痱子嗎？」（阿嬤以為是痱子膏）" },
  { id:"e1_02", src:"痞客邦", cat:"短故事", q:"有個人脖子上長了一個包，去看醫生。\n醫生說：「沒事，是良性腫瘤，不用在意它。」\n隔年回診，腫瘤消失了。\n醫生問：「怎麼消失的？」\n病人：「我在意它了。」", a:"（認真在意 → 腫瘤消失）" },
  { id:"e1_03", src:"痞客邦", cat:"短故事", q:"有位婦人坐公車，突然一個老人上車，婦人連忙起立讓座。\n老人感激地說：「謝謝妳，真是好人。」\n婦人微笑說：「應該的，我也是做媽媽的人。」\n老人頓了頓，問：", a:"「妳幾歲了？我才58而已。」" },
  { id:"e1_04", src:"痞客邦", cat:"短故事", q:"一個人站在橋上要跳河，警察趕到勸說了一個小時還是說不動。\n警察長官問：「情況怎樣？」\n警察回：「說不動他，反而……」", a:"「反而快被他說動了，我們兩個都想跳了。」" },
  { id:"e1_05", src:"痞客邦", cat:"短故事", q:"老師問：「你們知道糞便英文怎麼說嗎？」\n全班安靜。\n老師說：「是poo。」\n小明舉手問：「那大便呢？」", a:"老師：「都是poo！」\n小明：「那小便呢？」\n老師：「small poo？」（全班爆笑）" },
  { id:"e1_06", src:"痞客邦", cat:"短故事", q:"爸爸說：「兒子，我跟你說，男人不能輕易說對不起，也不能輕易說沒關係，知道嗎？」\n兒子：「為什麼？」\n爸爸說：「因為說了對不起，就要改；說了沒關係，就要忍。」\n兒子想了想問：", a:"「那我說謝謝呢？」\n爸爸：「那對方要說不客氣。」\n兒子：「這樣不是很虧嗎？」" },
  { id:"e1_07", src:"痞客邦", cat:"短故事", q:"夫妻倆吵架，太太越說越激動，拿起擀麵棍就要打老公。\n老公問：「你要幹嘛？」\n太太：「我要打死你！」\n老公冷靜說：「好，你打吧。不過你要想清楚，我死了之後……」\n太太愣了一下，放下擀麵棍問：「死了之後怎麼樣？」\n老公接著說：", a:"「死了之後，家裡的蟑螂就沒人打了。」" },
  { id:"e1_08", src:"痞客邦", cat:"短故事", q:"兩個小孩比賽吃辣，看誰先哭。\n第一個小孩吃了五秒就哭了。\n第二個小孩吃了十分鐘，一滴眼淚都沒流，贏了。\n裁判問他：「你到底怎麼辦到的？」\n他回答：", a:"「我忍不住想到我阿公昨天死了。」" },
  { id:"e1_09", src:"痞客邦", cat:"短故事", q:"老師叫小明造句：「請用「礙」字造句。」\n小明：「我的作業礙做完了。」\n老師：「礙是阻礙的礙，不是已經的已。再造一次。」\n小明：「我礙你這個老師。」\n老師：「什麼意思？」\n小明：", a:"「阻礙。我阻礙你這個老師。」（再想想……）" },
  { id:"e1_10", src:"痞客邦", cat:"短故事", q:"媽媽生氣叫兒子跪算盤，罰他跪一小時。\n半小時後媽媽心軟說：「好了，起來吧。」\n兒子說：「再等等，我有點事。」\n媽媽不解，湊近一看：", a:"兒子正在用膝蓋盤算盤上把算珠撥來撥去。" },
  { id:"e1_11", src:"痞客邦", cat:"短故事", q:"有一個人去算命，算命師說：「你將來會窮困潦倒，直到45歲。」\n那人問：「然後呢？45歲之後呢？」\n算命師說：", a:"「然後你就習慣了。」" },
  { id:"e1_12", src:"痞客邦", cat:"短故事", q:"小美嫁給了一個禿頭的人，朋友問：「他哪裡好？」\n小美說：「他是個完美的男人。」\n朋友問：「你不嫌他禿頭嗎？」\n小美說：「不嫌，禿頭的男人……」", a:"「要麼聰明，要麼性感，他兩樣都不是，所以完美。」" },
  { id:"e1_13", src:"痞客邦", cat:"短故事", q:"弟弟對哥哥說：「哥，我借你一萬元吧？」\n哥哥感激地說：「太好了，我正需要！」\n弟弟：「好，那我向你借一萬元。」\n哥哥：「……你說什麼？」\n弟弟：", a:"「剛才說借你一萬，現在要借回來。」（邏輯上說得通）" },
  { id:"e1_14", src:"痞客邦", cat:"短故事", q:"病人問醫生：「我這種病治好了之後，能不能去爬山？」\n醫生說：「當然可以。」\n病人開心說：「太好了！那我以前不能爬山的，治好之後就能去爬山了！」\n醫生沉默了一下說：", a:"「你以前不能爬山，是因為你懶，跟這個病沒關係。」" },
  { id:"e1_15", src:"痞客邦", cat:"短故事", q:"小明去廟裡拜神，虔誠地說：「神明啊！請保佑我考試100分！」\n廟祝說：「神明很忙，你要許清楚一點，是哪一科100分？」\n小明想了想說：", a:"「每一科100分。」\n廟祝：「你這不就是許願全部都100嗎？」\n小明：「我就是要許這個啊。」\n廟祝嘆氣：「你家裡有供奉神農大帝嗎？」\n小明：「沒有，為什麼？」\n廟祝：「因為你在異想天開。」" },

  // ── 寶貝問路 爆笑第2集精選 ──────────────────────────────
  { id:"e2_01", src:"痞客邦", cat:"短故事", q:"舅舅來家裡做客，小文卻對媽媽說：「媽媽，我要去動物園看猴子。」\n媽媽立即怒罵道：「看什麼猴子？你舅舅在這，你還去什麼動物園？」", a:"（媽媽自己說出來的）" },
  { id:"e2_02", src:"痞客邦", cat:"短句梗", q:"醫學報導連續抽菸600個月……", a:"可以多活50歲。" },
  { id:"e2_03", src:"痞客邦", cat:"短故事", q:"蘋果跟梨子在比賽，看誰先講到自己名字就輸了。\n梨子很興奮的說：「來啊！」", a:"於是梨子就輸了。" },
  { id:"e2_04", src:"痞客邦", cat:"短故事", q:"爸爸快過世了，把三個兒子叫來床邊，要讓他們明白團結的道理。叫老大折一根筷子、老二折十根、老三折一整把，三個兒子都做到了。\n三人不解地問：「所以爸爸找我們來有什麼事？」\n爸爸說：", a:"「沒事了……」" },
  { id:"e2_05", src:"痞客邦", cat:"短故事", q:"女朋友吵著問我：「我跟你媽困在火場你會先救誰？」\n我：", a:"「先救火。」" },
  { id:"e2_06", src:"痞客邦", cat:"短故事", q:"星期天哪裡越南人最多？", a:"越南。" },
  { id:"e2_07", src:"痞客邦", cat:"短故事", q:"醫生：「Tony，不要緊張這只是個小手術。」\n病人：「我不叫Tony。」\n醫生：", a:"「我知道，Tony是我。」" },
  { id:"e2_08", src:"痞客邦", cat:"短故事", q:"有個人對著山洞大喊：「嗚郎滴欸某？」\n山洞裡有聲音回答：「嗚~~」\n然後……", a:"他就被火車撞死了。" },
  { id:"e2_09", src:"痞客邦", cat:"短故事", q:"愚公臨死前召集兒子來到床邊虛弱地說：「移山…移山………」\n兒子：「亮晶晶？」", a:"愚公卒。" },
  { id:"e2_10", src:"痞客邦", cat:"短故事", q:"有一對情侶吵架，女生很生氣地奪門而出，然後男生很快速地跑出去……", a:"把門奪回來了。" },
  { id:"e2_11", src:"痞客邦", cat:"短故事", q:"平地的貓咪都會喵喵叫，那山上的貓呢？", a:"喵的拉。" },
  { id:"e2_12", src:"痞客邦", cat:"短故事", q:"小明去夜市吃臭豆腐。\n小明：「老闆，這臭豆腐怎麼那麼軟？」\n老闆：", a:"「因為你沒認真吃啊！認真就酥（輸）了！」" },
  { id:"e2_13", src:"痞客邦", cat:"短故事", q:"有天小明到天庭跟眾仙開會。\n小明：「玉皇大帝，千手觀音為什麼還沒到呢？」\n玉皇大帝：", a:"「因為她還在洗手……」" },
  { id:"e2_14", src:"痞客邦", cat:"短故事", q:"約翰問中國朋友：「你們中國人真有人情味，何以見得？」\n約翰：「我們西方人路上車禍，一定先打電話叫救護車，而你們中國人……」", a:"「卻先問候別人的媽媽。」" },
  { id:"e2_15", src:"痞客邦", cat:"短故事", q:"動物園的一頭大象死了，一個職員在旁邊痛哭。\n遊客說：「這個人對死去的大象真有感情。」\n主管聽到說：", a:"「當然不是這樣，是因為我要他負責為大象挖個墓坑。」" },
  { id:"e2_16", src:"痞客邦", cat:"地獄梗", q:"法官怒斥被告：「我擔任這個地方法院法官這些年，已經在法庭上見過你七次，難道你不覺得羞恥嗎？」\n被告：", a:"「你不能升官，可不是我的過錯。」" },
  { id:"e2_17", src:"痞客邦", cat:"短故事", q:"男朋友問女朋友：「除了我，還有什麼人吻過你？」\n女朋友沉默片刻。\n男朋友：「快點回答我吧！」\n女朋友：", a:"「不要吵，我正在數！」" },
  { id:"e2_18", src:"痞客邦", cat:"短故事", q:"老師：「小新，現在用一句成語來形容老師很開心？」\n小新答：", a:"「含笑九泉。」" },
  { id:"e2_19", src:"痞客邦", cat:"短故事", q:"奧運100米決賽產生世界紀錄。\n小明：「我爸爸跑的話，只要九秒。」\n小華：「我爸爸更厲害，起跑的一瞬間，他就出現在終點了。」\n小強：", a:"「我爸爸才厲害，他公司五點下班，他四點半就坐在家裡看電視了。」" },
  { id:"e2_20", src:"痞客邦", cat:"短故事", q:"小明的媽媽要他出去買雞蛋。\n小明說：「等一下！」\n媽媽說：「等什麼等？我自己出去買算了！」\n小明說：", a:"「我就是等妳這句話！」" },
  { id:"e2_21", src:"痞客邦", cat:"短故事", q:"小明：「爸爸，這次中期考試我有一半科目不及格…」\n爸爸：「沒關係，繼續努力！」\n幾個月後，小明：「爸爸，這次我有一半的科目及格啦！」\n爸爸：", a:"「不錯，有進步，繼續努力……」（兩次都是一半）" },
  { id:"e2_22", src:"痞客邦", cat:"短故事", q:"小明說：「爸爸，講歷史故事給我聽呀！」\n爸爸：「從前，有一隻青蛙……」\n小明：「我要聽歷史故事！」\n爸爸：", a:"「好……在宋朝，有一隻青蛙……」" },
  { id:"e2_23", src:"痞客邦", cat:"短故事", q:"小明下班回家，老婆說：「老公我有好消息和壞消息，先說哪個？」\n小明：「好消息。」\n老婆：「原來我們汽車的安全氣囊是有效的。」", a:"（壞消息是出車禍了）" },
  { id:"e2_24", src:"痞客邦", cat:"地獄梗", q:"皇帝對小李子說：「你用一個字來形容朕。」\n小李子回答：「喳！」", a:"然後小李子就被砍了。（喳→查→暗指皇帝有問題）" },
  { id:"e2_25", src:"痞客邦", cat:"短故事", q:"A：你有《時間簡史》嗎？\nB：", a:"神經病，我有時間也不撿屎！" },

  // ── 寶貝問路 爆笑第4集 醫生系列精選 ────────────────────
  { id:"e4_01", src:"痞客邦", cat:"地獄梗", q:"醫生：「我有壞消息跟更慘的消息要跟你說。壞消息是你最多只剩24小時了。」\n老人：「那更慘的消息是什麼？」\n醫生：", a:"「本來昨天就要說的。」" },
  { id:"e4_02", src:"痞客邦", cat:"短故事", q:"醫生：「你知道時間就是金錢這句話吧？」\n老人：「嗯。」\n醫生：", a:"「你破產了。」" },
  { id:"e4_03", src:"痞客邦", cat:"短故事", q:"醫生：「阿嬤今天怎麼了？」\n阿嬤：「醫生，我只要這樣，這裡就會很痛耶！」\n醫生：", a:"「那你就不要這樣。」" },
  { id:"e4_04", src:"痞客邦", cat:"地獄梗🔞", q:"醫生：「你的洞很大……洞很大。」\n病患：「你不需要說兩次！」\n醫生：", a:"「我沒有，那是回音。」" },
  { id:"e4_05", src:"痞客邦", cat:"地獄梗", q:"醫生：「病人已經沒有心跳了！」\n護士：", a:"「沒關係，快Po上臉書叫大家集氣。」" },
  { id:"e4_06", src:"痞客邦", cat:"短故事", q:"醫生：「放輕鬆志明，這只是一個很小的傷口而已，不用緊張。」\n病人：「醫生，我不叫志明……」\n醫生：", a:"「我知道，志明是我。」" },
  { id:"e4_07", src:"痞客邦", cat:"短故事", q:"醫生：「我有壞消息和更慘的消息要跟你說。」先說壞消息。\n壞消息：你最多只剩24小時了。\n更慘的消息：", a:"本來昨天就要說的。" },
  { id:"e4_08", src:"痞客邦", cat:"短故事", q:"老人：「醫生，我每天早上起床的時候，背都很痛！」\n醫生：「那你換成下午起床就好了。」", a:"（直接解決問題）" },
  { id:"e4_09", src:"痞客邦", cat:"短故事", q:"一個人問老中醫：「醫師，我的病是不是無藥可救了？」\n老中醫說：「不會的，中醫自古到今醫好了多少病人，那些醫不好的……」", a:"「都死了，沒法說話。」" },
  { id:"e4_10", src:"痞客邦", cat:"短故事", q:"病人手術後問醫生：「我還能活多久？」\n醫生說：「10。」\n病人：「10年？10個月？還是10天？」\n醫生：", a:"「9……8……7……」" },
  { id:"e4_11", src:"痞客邦", cat:"短故事", q:"有位老太太去看骨科醫生，醫生說：「妳這是老化現象，是自然規律，沒有藥可醫的。」\n老太太說：「醫生，我另一隻膝蓋也是同樣年紀，怎麼它沒這樣？」\n醫生：", a:"（沉默）" },
  { id:"e4_12", src:"痞客邦", cat:"短故事", q:"小兒科醫生替小孩子看診，不忘安慰說：「來，張開嘴巴說啊。」\n孩子的媽媽說：「不用，醫生，他的問題在腳。」\n醫生說：", a:"「我知道，但我想讓你媽媽閉嘴。」" },
  { id:"e4_13", src:"痞客邦", cat:"短故事", q:"護士在急診室門口用廣播呼叫：「請問有沒有人認識這個人？」\n一個老人走過來說：「我認識他。」\n護士：「他叫什麼名字？」\n老人：", a:"「我不知道他叫什麼，但我在他的口袋裡看到我的錢包。」" },
  { id:"e4_14", src:"痞客邦", cat:"地獄梗", q:"醫生對病人說：「你生病的原因是因為你喝太多酒、太胖、而且完全不運動。」\n病人：「醫生，我需要第二個意見。」\n醫生：", a:"「好，你很醜。」" },
  { id:"e4_15", src:"痞客邦", cat:"短故事", q:"有位先生去看醫生，說胃不舒服。\n醫生說：「你最近吃了什麼？」\n先生說：「醫生，我是個正常人，今天早上吃了油條豆漿，中午吃了便當，晚上……」\n醫生打斷說：「好，你先脫掉衣服。」\n先生：「那我晚上吃的……」\n醫生：", a:"「我不需要知道你晚上吃什麼，我只需要你脫衣服。」" },

  { id:"e5_04", src:"痞客邦", cat:"短故事", q:"全國最富的人請了全國最好的建築師來給自己建造陵墓。三年之後，富翁問建築師：「全部工程都完成了嗎？」\n「差不多了。」\n「還差什麼呢？」\n建築師說：", a:"「只差你了。」" },

  { id:"e5_07", src:"痞客邦", cat:"腦筋急轉彎", q:"為什麼櫻花鉤吻鮭敢跟熊打架？", a:"因為它特有種。" },

  { id:"e5_12", src:"痞客邦", cat:"短故事", q:"有一天有個外國人來台灣觀光，上公車後準備投錢。\n司機：「下車投。」\n外國人卻執意要投，司機不耐煩再說：「下車投！」\n於是外國人下車後，不滿地看著司機大喊：", a:"「窩油不是Michael Jordan！」" },
  { id:"e5_13", src:"痞客邦", cat:"短故事", q:"有一間門庭若市的店，一名男子對服務人員說：「我是貴賓欸，憑什麼要排隊！」\n店員：", a:"「就算是哈士奇也要排隊。」" },
  { id:"e5_14", src:"痞客邦", cat:"短故事", q:"兒子：「賤賤賤賤賤賤賤……」\n媽媽：「醫生啊，這小子從昨晚一直喊到現在，這到底是什麼怪病？」\n醫生沉思後說：", a:"「嗯……這是一種罕見的疾病。」" },
  { id:"e5_15", src:"痞客邦", cat:"短故事", q:"我：「欸，你跟我借白膠。」\n友人：「喔！借我白膠。」\n我：「我沒有。」\n友人：「……」\n我：", a:"「我只是想讓你知道我這個朋友沒有白膠。」" },
  { id:"e5_16", src:"痞客邦", cat:"短故事", q:"當榴槤遇到釋迦，榴槤說：「區區一個釋迦憑什麼跟我講話！」\n釋迦說：「我不是一般的釋迦！我是……」", a:"「貴族釋迦！」" },

  { id:"e5_21", src:"痞客邦", cat:"短故事", q:"「爸爸，我今天可不可以留在家裡？我覺得不舒服。」\n「你覺得什麼地方不舒服？」\n小兒子：", a:"「學校。」" },
  { id:"e5_22", src:"痞客邦", cat:"短故事", q:"一位年輕人很想獲得自由，跑去問自由女神如何才能得到自由。\n自由女神說：", a:"「你看我自由嗎？」" },
  { id:"e5_23", src:"痞客邦", cat:"短故事", q:"雞跟牛發牢騷：「人讓我們多下蛋，自己卻計劃生育，太不公平了！」\n牛說：", a:"「你那點委屈算什麼，那麼多人喝我的奶，有誰叫我一聲媽！」" },
  { id:"e5_24", src:"痞客邦", cat:"短故事", q:"老師問：「請用在乎兩字造句。」\n學生：「在乎胸口的傷痛，誰說時間能沖淡一切？」\n老師：「很好，非常感性！下一個。」\n另一學生：", a:"「在乎，就是在桌上放一個乎。」" },
  { id:"e5_25", src:"痞客邦", cat:"短故事", q:"有一個女孩從小被虐待，後來長大後報警抓了養父母，但記者採訪她時，她卻流著眼淚說：", a:"「謝謝你們，沒有他們的虐待，我今天不會這麼堅強。」" },
  { id:"e5_26", src:"痞客邦", cat:"短故事", q:"甲：「你說，為什麼人要孝順父母呢？」\n乙：「因為他們很辛苦把我們養大。」\n甲：「那如果他們對我們不好呢？」\n乙：", a:"「那就等他們老了再說。」" },
  { id:"e5_27", src:"痞客邦", cat:"短故事", q:"老師說：「失敗為成功之母。」\n學生問：「那成功為什麼之父？」\n老師：「努力。」\n學生：「那努力的媽媽是誰？」\n老師：「……」\n學生：", a:"「是不是失敗啊？所以失敗外孫成功。」" },
  { id:"e5_28", src:"痞客邦", cat:"短故事", q:"「老師，我能問您一個問題嗎？」\n「當然。」\n「如果我解決不了問題，又遇到問題，但解決了遇到問題的問題，這樣算有解決問題嗎？」\n老師沉默許久後說：", a:"「下課了。」" },
  { id:"e5_29", src:"痞客邦", cat:"短故事", q:"小明問：「老師，什麼是謊言？」\n老師說：「就是與事實不符的話。」\n小明：「那老師上課說的話都是謊言？」\n老師：「為什麼？」\n小明：", a:"「因為老師說上課要集中精神聽講，但老師上課時眼睛都閉著。」" },
  { id:"e5_30", src:"痞客邦", cat:"短故事", q:"外國記者問中國學生：「你有沒有自由發言的權利？」\n學生：「當然有，我可以批評美國總統。」\n記者：「那你可以批評中國主席嗎？」\n學生：", a:"「我剛說了，我可以批評任何一位我想批評的外國領袖。」" },
  { id:"e5_31", src:"痞客邦", cat:"短故事", q:"老師：「為什麼遲到？」\n學生：「因為路上有個告示牌。」\n老師：「告示牌跟遲到有什麼關係？」\n學生：", a:"「告示牌上寫：前面施工，請繞道。」" },
  { id:"e5_32", src:"痞客邦", cat:"地獄梗", q:"有個人在面試時被問到：「你覺得自己最大的缺點是什麼？」\n他想了很久說：「我覺得我太誠實了。」\n面試官說：「這不算缺點吧？」\n他說：", a:"「我管你怎麼想。」" },
  { id:"e5_33", src:"痞客邦", cat:"短故事", q:"一個小孩問爸爸：「爸，你和媽媽是在哪裡認識的？」\n爸爸說：「在盲人機構。」\n小孩問：「你們都是盲人嗎？」\n爸爸說：", a:"「不，我們是去當義工的，但遇到之後雙眼都瞎了。」" },
  { id:"e5_34", src:"痞客邦", cat:"短故事", q:"媽媽：「你昨天是不是把弟弟弄哭了？」\n孩子：「沒有，弟弟自己哭的。」\n媽媽：「你做了什麼讓他哭？」\n孩子：「我只是跟他說，媽媽生他之前更喜歡我。」\n媽媽：「……」\n孩子：", a:"「他不相信，我是說真的。」" },
  { id:"e5_35", src:"痞客邦", cat:"短故事", q:"有個人被判了死刑，行刑前被問有什麼最後的願望。\n他說：「我想再吃一碗牛肉麵。」\n法官說：「好，今天就先暫停執行，等他把麵吃完。」\n三個小時後，他把麵推開說：", a:"「太鹹了，我不吃了。」\n（然後就這樣一直活著）" },

// ── API ───────────────────────────────────────────────────────
async function apiGet(action){
  const res = await fetch(`${API}?action=${action}&_=${Date.now()}`);
  return res.json();
}
async function apiPost(body){
  await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)});
}

// ── 狀態 ──────────────────────────────────────────────────────
let liked=[], rejected=new Set(), queue=[], current=null, revealed=false;
let pendingSaves=0, currentTab='rate', filterCat='全部';
let sharedMap={}, shareFilter='all';

// ── 初始化 ────────────────────────────────────────────────────
async function init(){
  show('loading-msg'); hide('card-area'); hide('error-view'); hide('empty-view');
  try {
    const [likedData, rejectedData, sharedData] = await Promise.all([apiGet('getLiked'),apiGet('getRejected'),apiGet('getShared')]);
    sharedMap = sharedData||{};
    // normalize欄位名稱（防止Sheets回傳的key有空白或大小寫問題）
    liked = (likedData||[]).map(r=>({
      id: String(r.id||r.ID||'').trim(),
      cat: String(r.cat||r.CAT||'').trim(),
      q: String(r.q||r.Q||'').trim(),
      a: String(r.a||r.A||'').trim(),
      src: String(r.src||r.SRC||'').trim(),
    })).filter(r=>r.id);
    rejected = new Set((rejectedData||[]).map(s=>String(s).trim()));
    const likedIds = new Set(liked.map(j=>j.id));
    queue = JOKES.filter(j=>!rejected.has(j.id)&&!likedIds.has(j.id));
    hide('loading-msg');
    updateUI();
    showNext();
  } catch(e){
    hide('loading-msg'); show('error-view');
    document.getElementById('error-msg').innerHTML=
      '無法連到 Google Sheets<br><br>請確認：<br>1. 網路連線正常<br>2. Apps Script 存取權設為「任何人」<br><small style="color:#555">'+e.message+'</small>';
  }
}

// ── 顯示下一則 ────────────────────────────────────────────────
function showNext(){
  const card = document.getElementById('joke-card');
  card.classList.remove('swipe-right','swipe-left','swiping');
  card.style.transform='';
  document.getElementById('like-hint').style.opacity='0';
  document.getElementById('dislike-hint').style.opacity='0';

  if(queue.length===0){
    hide('card-area'); hide('vote-btns'); hide('swipe-hint');
    document.getElementById('empty-liked').textContent=liked.length;
    show('empty-view'); return;
  }
  current=queue[0]; revealed=false;
  document.getElementById('cat-tag').textContent=current.cat;
  document.getElementById('src-tag').textContent='來源：'+current.src;
  document.getElementById('joke-q').textContent=current.q;
  document.getElementById('joke-a').textContent='👉 '+current.a;
  document.getElementById('joke-a').style.display='none';
  document.getElementById('reveal-btn').style.display='block';
  document.getElementById('vote-btns').style.display='none';
  hide('empty-view');
  show('card-area');
  show('swipe-hint');
  updateStatus();
}

function revealAnswer(){
  if(!current) return;
  document.getElementById('joke-a').style.display='block';
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('vote-btns').style.display='flex';
  revealed=true;
}

function vote(isLike){
  if(!current) return;
  const card=document.getElementById('joke-card');
  card.classList.add(isLike?'swipe-right':'swipe-left');
  const j=current; queue=queue.slice(1);
  if(isLike) liked.push(j); else rejected.add(j.id);
  updateUI();
  pendingSaves++;
  updateStatus();
  const body=isLike?{action:'like',joke:j}:{action:'reject',id:j.id};
  apiPost(body).catch(()=>{}).finally(()=>{pendingSaves--;updateStatus();});
  setTimeout(()=>showNext(),300);
}

function updateStatus(){
  const el=document.getElementById('queue-status');
  if(!el) return;
  const sync=pendingSaves>0?'<span style="color:#ffe135;font-size:.7rem">☁ 同步中…</span>':'<span style="color:#333;font-size:.7rem">✓ 已同步</span>';
  el.innerHTML=`佇列還有 ${queue.length} 則待評 · ${sync}`;
}

// ── 滑動手勢 ──────────────────────────────────────────────────
let touchStartX=0, touchStartY=0, isDragging=false, dragX=0;
const SWIPE_THRESHOLD=80;

function setupSwipe(){
  const card=document.getElementById('joke-card');

  card.addEventListener('touchstart',e=>{
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    isDragging=false; dragX=0;
    card.classList.add('swiping');
  },{passive:true});

  card.addEventListener('touchmove',e=>{
    if(!current||!revealed) return;
    const dx=e.touches[0].clientX-touchStartX;
    const dy=e.touches[0].clientY-touchStartY;
    if(!isDragging&&Math.abs(dy)>Math.abs(dx)) return; // 垂直滑動不攔截
    isDragging=true;
    dragX=dx;
    const rot=dx*0.08;
    card.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
    const progress=Math.min(Math.abs(dx)/SWIPE_THRESHOLD,1);
    document.getElementById('like-hint').style.opacity=dx>0?progress:0;
    document.getElementById('dislike-hint').style.opacity=dx<0?progress:0;
  },{passive:true});

  card.addEventListener('touchend',()=>{
    if(!isDragging){ card.classList.remove('swiping'); return; }
    card.classList.remove('swiping');
    if(dragX>SWIPE_THRESHOLD&&revealed) vote(true);
    else if(dragX<-SWIPE_THRESHOLD&&revealed) vote(false);
    else{
      card.style.transform='';
      document.getElementById('like-hint').style.opacity='0';
      document.getElementById('dislike-hint').style.opacity='0';
    }
    isDragging=false; dragX=0;
  });

  // 鍵盤支援
  document.addEventListener('keydown',e=>{
    if(!current) return;
    if(e.key==='ArrowRight'&&revealed) vote(true);
    if(e.key==='ArrowLeft'&&revealed) vote(false);
    if(e.key===' '||e.key==='Enter'){e.preventDefault();if(!revealed)revealAnswer();}
  });
}

// ── UI ────────────────────────────────────────────────────────
function updateUI(){
  const pct=Math.min(liked.length/TARGET*100,100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('liked-count').textContent='已收藏 '+liked.length+' 則';
  document.getElementById('tab-collection').textContent='📚 收藏（'+liked.length+'）';
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='rate')||(i===1&&tab==='collection')));
  if(tab==='rate'){
    document.getElementById('rate-view').style.display='flex';
    document.getElementById('collection-view').style.display='none';
  } else {
    document.getElementById('rate-view').style.display='none';
    document.getElementById('collection-view').style.display='flex';
    document.getElementById('collection-view').style.height='';
    renderCollection();
  }
}

function renderCollection(){
  const cats=['全部',...new Set(liked.map(j=>j.cat))];
  document.getElementById('collection-cats').innerHTML=cats.map(c=>
    `<button class="cat-filter${c===filterCat?' active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`
  ).join('');

  let filtered=filterCat==='全部'?liked:liked.filter(j=>j.cat===filterCat);
  if(shareFilter==='unshared') filtered=filtered.filter(j=>!sharedMap[j.id]);
  if(shareFilter==='shared') filtered=filtered.filter(j=>!!sharedMap[j.id]);

  const grid=document.getElementById('collection-grid');
  if(liked.length===0){grid.innerHTML='<div id="no-collection">還沒有收藏，去評分吧！</div>';return;}
  if(filtered.length===0){grid.innerHTML='<div id="no-collection">這個分類沒有笑話</div>';return;}

  grid.innerHTML=filtered.map(j=>{
    const isShared=!!sharedMap[j.id];
    const sharedDate=sharedMap[j.id]||'';
    const copyText=j.q+'\n\n👉 '+j.a;
    return `
    <div class="joke-card-col${isShared?' shared':''}" id="jc-${j.id}">
      <div class="jcat">${j.cat} · ${j.src||''}${isShared?` · <span style="color:#55cc55;font-size:0.62rem">✅ ${sharedDate}</span>`:''}</div>
      <div class="jq">${j.q.replace(/\n/g,'<br>')}</div>
      <div class="ja">👉 ${j.a}</div>
      <div class="joke-actions">
        <button class="btn-copy" onclick="copyJoke('${j.id}',this)" data-text="${encodeURIComponent(copyText)}">📋 複製</button>
        <button class="btn-share${isShared?' shared':''}" onclick="toggleShare('${j.id}',this)">
          ${isShared?'✅ 已分享':'📤 標記分享'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function setCat(c){filterCat=c;renderCollection();}

function setShareFilter(f){
  shareFilter=f;
  ['all','unshared','shared'].forEach(x=>{
    const el=document.getElementById('sf-'+x);
    if(el) el.classList.toggle('active',x===f);
  });
  renderCollection();
}

function copyJoke(id, btn){
  const text=decodeURIComponent(btn.dataset.text);
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✅ 已複製！';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 複製';btn.classList.remove('copied');},2000);
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='✅ 已複製！'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 複製';btn.classList.remove('copied');},2000);
  });
}

function toggleShare(id, btn){
  const isShared=!!sharedMap[id];
  const card=document.getElementById('jc-'+id);
  if(isShared){
    delete sharedMap[id];
    btn.textContent='📤 標記分享'; btn.classList.remove('shared');
    if(card){ card.classList.remove('shared');
      const cat=card.querySelector('.jcat');
      if(cat) cat.innerHTML=cat.innerHTML.replace(/·\s*<span[^>]*>.*?<\/span>/,'');
    }
    apiPost({action:'unshare',id}).catch(()=>{});
  } else {
    const today=new Date().toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    sharedMap[id]=today;
    btn.textContent='✅ 已分享'; btn.classList.add('shared');
    if(card){ card.classList.add('shared');
      const cat=card.querySelector('.jcat');
      if(cat && !cat.querySelector('span')) cat.innerHTML+=` · <span style="color:#55cc55;font-size:0.62rem">✅ ${today}</span>`;
    }
    apiPost({action:'share',id,date:today}).catch(()=>{});
  }
  if(shareFilter!=='all') setTimeout(()=>renderCollection(),800);
}
function show(id){const el=document.getElementById(id);if(el)el.style.display='';}
function hide(id){const el=document.getElementById(id);if(el)el.style.display='none';}

setupSwipe();
init();
</script>
